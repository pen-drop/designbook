name: Release

on:
  # PR-label-driven: merging next -> main runs auto, which derives the release
  # from the merged PRs' labels (major/minor/patch/skip-release).
  push:
    branches:
      - main
  # Manual fallback.
  workflow_dispatch:

permissions:
  id-token: write # npm provenance
  contents: write # auto pushes the version commit + tag to main
  issues: write # auto comments on released issues
  pull-requests: write # auto comments on released PRs

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # auto needs full history + tags

      - name: Prepare repository
        run: git fetch --unshallow --tags || git fetch --tags

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          pnpm release

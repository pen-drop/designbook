description: "Designbook chain — sequential workflows in shared workspace"

outputPath: promptfoo/reports/chain.json

prompts:
  - id: vision
    label: "[01] vision"
    raw: |
      You are working in the directory {{workspace}}.
      Run the /debo vision workflow. Do NOT ask any questions — use the following inputs directly:

      Product name: PetMatch
      Description: A modern pet adoption platform connecting shelters with potential adopters
      Problems & Solutions:
      1. Shelters struggle to showcase available pets → Rich pet profiles with photos and personality traits
      2. Adopters can't filter by lifestyle compatibility → Smart matching algorithm based on living situation
      3. Post-adoption support is lacking → Built-in community and vet appointment scheduling
      Key Features:
      - Pet profile browser with advanced search
      - Shelter dashboard for managing listings
      - Adoption application workflow
      - Community forum and resources
      - Vet integration and health tracking

      Execute the workflow now.

  - id: sections
    label: "[02] sections"
    raw: |
      You are working in the directory {{workspace}}.
      Run the /debo sections workflow. Do NOT ask any questions.
      The product is "PetMatch" — a pet adoption platform. Read the product overview at designbook/product/vision.md.
      Create between 3 and 5 sections that cover the key areas of the product.
      Execute the workflow now.

  - id: tokens
    label: "[03] tokens"
    raw: |
      You are working in the directory {{workspace}}.
      Run the /debo tokens workflow. Do NOT ask any questions — use the following inputs directly:

      Product: PetMatch (pet adoption platform)
      Color palette:
      - Primary: #4F46E5 (indigo — trust/reliability)
      - Secondary: #10B981 (emerald — nature/growth)
      - Accent: #F59E0B (amber — warmth/energy)
      - Neutral: #1F2937 (dark gray)
      - Surface: #F9FAFB (light gray)
      Typography:
      - Heading: Inter
      - Body: Inter
      - Mono: JetBrains Mono

      Execute the workflow now.

  - id: css-generate
    label: "[04] css-generate"
    raw: |
      You are working in the directory {{workspace}}.
      Run the /debo css-generate workflow. Do NOT ask any questions.
      Read the designbook.config.yml for configuration. Generate CSS token files from the existing design-tokens.yml.
      Execute the workflow now.

  - id: data-model
    label: "[05] data-model"
    raw: |
      You are working in the directory {{workspace}}.
      Run the /debo data-model workflow. Do NOT ask any questions.
      The product is "PetMatch". Read the product overview at designbook/product/vision.md.
      Define entity types for: pets (with fields for name, breed, age, description, photo, status), shelters (name, location, contact), adoption applications (applicant info, pet reference, status), and categories (name, description).
      Execute the workflow now.

  - id: shape-section
    label: "[06] shape-section"
    raw: |
      You are working in the directory {{workspace}}.
      Run the /debo shape-section workflow for the "homepage" section. Do NOT ask any questions.
      The product is "PetMatch". Read designbook/sections/homepage/spec.section.yml for context.
      Define user flows for: browsing featured pets, searching/filtering pets, and initiating an adoption application.
      Execute the workflow now.

  - id: design-component
    label: "[07] design-component"
    raw: |
      You are working in the directory {{workspace}}.
      Run the /debo design-component workflow. Do NOT ask any questions.
      Create a "pet-card" component for PetMatch that displays: pet photo, name, breed, age, and an "Adopt Me" button.
      The component should have variants: default and featured (with a highlight border).
      Execute the workflow now.

  - id: sample-data
    label: "[08] sample-data"
    raw: |
      You are working in the directory {{workspace}}.
      Run the /debo sample-data workflow for the "homepage" section. Do NOT ask any questions.
      The product is "PetMatch". Read designbook/data-model.yml for the entity schema.
      Generate realistic sample data with at least 5 pet records, 2 shelter records, and 3 category records.
      Use real pet names, breeds, and descriptions — no placeholder text.
      Execute the workflow now.

  - id: design-screen
    label: "[09] design-screen"
    raw: |
      You are working in the directory {{workspace}}.
      Run the /debo design-screen workflow for the "homepage" section. Do NOT ask any questions.
      The product is "PetMatch". Read designbook/sections/homepage/spec.section.yml for context.
      The homepage should include: a hero section, featured pets grid, search/filter area, and a call-to-action for shelters.
      Generate UI components, entity-mapping (JSONata files), and a scenes file.
      After generating all files, run `pnpm build-storybook` to verify everything renders.
      Execute the workflow now.

  - id: design-shell
    label: "[10] design-shell"
    raw: |
      You are working in the directory {{workspace}}.
      Run the /debo design-shell workflow. Do NOT ask any questions.
      The product is "PetMatch". Read the product overview and section definitions for navigation planning.
      The shell should have a top navigation bar with links to all sections, a footer, and responsive mobile menu.
      The result should be a shell.scenes.yml file under designbook/shell/ and page/header/footer components.
      After generating all files, run `pnpm build-storybook` to verify everything renders.
      Execute the workflow now.

providers:
  - id: file://../providers/claude-cli.mjs
    label: claude-opus-4-6
    config:
      model: claude-opus-4-6
      timeout: 300000
      max_turns: 100

evaluateOptions:
  maxConcurrency: 1

defaultTest:
  vars:
    workspace: promptfoo/workspaces/chain
  options:
    provider:
      id: file://../providers/claude-cli.mjs
      config:
        model: claude-opus-4-6
        timeout: 300000
        max_turns: 100

tests:
  # [01] Vision — no dependencies
  # Workflow: vision
  # Stages: designbook-vision:intake, create-vision
  # Output: designbook/product/vision.md
  - description: "[01] vision"
    prompts: [vision]
    assert:
      - type: llm-rubric
        value: |
          Check the WORKSPACE ARTIFACTS section for actual file data.
          Output file verification:
          1. designbook/product/vision.md exists in "New Output Files" list
          2. Its content (in "New Output File Contents") has a level-1 heading with "PetMatch"
          3. Contains "## Description" section with 1-3 sentences
          4. Contains "## Problems & Solutions" section with at least 2 problem/solution pairs
          5. Contains "## Key Features" section with at least 3 features
      - type: llm-rubric
        value: |
          Check the WORKSPACE ARTIFACTS section for actual workflow data.
          Workflow lifecycle verification for vision (expected stages: designbook-vision:intake, create-vision):
          1. In "Archived Workflow (this run)", a tasks.yml for vision exists
          2. The tasks.yml has top-level "status: completed"
          3. The tasks.yml has "workflow: vision"
          4. The tasks.yml lists stages including "designbook-vision:intake" and "create-vision"
          5. All tasks in the tasks array have "status: done"
          6. There is NO vision entry in "In-Progress Workflows (NOT archived — indicates failure)"

  # [02] Sections — depends on: vision
  # Workflow: sections
  # Output: designbook/sections/*/spec.section.yml
  - description: "[02] sections"
    prompts: [sections]
    assert:
      - type: llm-rubric
        value: |
          Check the WORKSPACE ARTIFACTS section for actual file data.
          Output file verification:
          1. 3-5 spec.section.yml files exist under designbook/sections/ in "New Output Files"
          2. Each spec.section.yml content contains: id (kebab-case), title, description, status ("planned"), order
          3. The order values are sequential (1, 2, 3, ...)
      - type: llm-rubric
        value: |
          Check the WORKSPACE ARTIFACTS section for actual workflow data.
          Workflow lifecycle verification for sections (expected stages: sections:intake, create-section):
          1. In "Archived Workflow (this run)", a tasks.yml for sections exists
          2. The tasks.yml has top-level "status: completed"
          3. The tasks.yml has "workflow: sections"
          4. The tasks.yml lists stages including "designbook-sections:intake" and "designbook-sections:create-section"
          5. All tasks in the tasks array have "status: done"
          6. There are 3-5 tasks in the create-section stage (one per section)
          7. There is NO sections entry in "In-Progress Workflows (NOT archived — indicates failure)"

  # [03] Design Tokens — depends on: vision
  # Workflow: design-tokens
  # Output: designbook/design-system/design-tokens.yml
  - description: "[03] tokens"
    prompts: [tokens]
    assert:
      - type: llm-rubric
        value: |
          Check the WORKSPACE ARTIFACTS section for actual file data.
          Output file verification:
          1. designbook/design-system/design-tokens.yml exists in "New Output Files"
          2. Its content contains color tokens (primary, secondary, accent)
          3. Its content contains typography tokens (heading, body font families)
          4. Content is valid W3C Design Token YAML format
      - type: llm-rubric
        value: |
          Check the WORKSPACE ARTIFACTS section for actual workflow data.
          Workflow lifecycle verification for tokens (expected stages: tokens:intake, create-tokens):
          1. In "Archived Workflow (this run)", a tasks.yml for tokens exists
          2. The tasks.yml has top-level "status: completed"
          3. The tasks.yml has "workflow: tokens"
          4. The tasks.yml lists stages including "designbook-tokens:intake" and "create-tokens"
          5. All tasks in the tasks array have "status: done"
          6. There is NO tokens entry in "In-Progress Workflows (NOT archived — indicates failure)"

  # [04] CSS Generate — depends on: design-tokens
  # Workflow: css-generate
  # Output: css/tokens/*.src.css
  - description: "[04] css-generate"
    prompts: [css-generate]
    assert:
      - type: llm-rubric
        value: |
          Check the WORKSPACE ARTIFACTS section and the conversation output.
          Output file verification:
          1. The agent mentions generating CSS token files with .src.css extension
          2. The agent read design-tokens.yml as input
          3. No errors reported
      - type: llm-rubric
        value: |
          Check the WORKSPACE ARTIFACTS section for actual workflow data.
          Workflow lifecycle verification for css-generate (expected stages: css-generate:intake, generate-jsonata, generate-css):
          1. In "Archived Workflow (this run)", a tasks.yml for css-generate exists
          2. The tasks.yml has top-level "status: completed"
          3. The tasks.yml has "workflow: css-generate"
          4. The tasks.yml lists stages including "designbook-css-generate:intake", "generate-jsonata", and "generate-css"
          5. All tasks in the tasks array have "status: done"
          6. There is NO css-generate entry in "In-Progress Workflows (NOT archived — indicates failure)"

  # [05] Data Model — depends on: vision
  # Workflow: data-model
  # Output: designbook/data-model.yml
  - description: "[05] data-model"
    prompts: [data-model]
    assert:
      - type: llm-rubric
        value: |
          Check the WORKSPACE ARTIFACTS section for actual file data.
          Output file verification:
          1. designbook/data-model.yml exists in "New Output Files"
          2. Its content contains entity types for pets (with fields for name, breed, age, description, photo, status)
          3. Its content contains entity types for shelters (with fields for name, location, contact)
          4. Its content contains entity types for adoption applications and/or categories
          5. Content is valid YAML
      - type: llm-rubric
        value: |
          Check the WORKSPACE ARTIFACTS section for actual workflow data.
          Workflow lifecycle verification for data-model (expected stages: data-model:intake, create-data-model):
          1. In "Archived Workflow (this run)", a tasks.yml for data-model exists
          2. The tasks.yml has top-level "status: completed"
          3. The tasks.yml has "workflow: data-model"
          4. The tasks.yml lists stages including "designbook-data-model:intake" and "create-data-model"
          5. All tasks in the tasks array have "status: done"
          6. There is NO data-model entry in "In-Progress Workflows (NOT archived — indicates failure)"

  # [06] Shape Section — depends on: sections
  # Workflow: shape-section
  # Output: updates designbook/sections/homepage/spec.section.yml
  - description: "[06] shape-section"
    prompts: [shape-section]
    assert:
      - type: llm-rubric
        value: |
          Check the WORKSPACE ARTIFACTS section for actual file data.
          Output file verification:
          1. A spec.section.yml exists under designbook/sections/ in "New Output Files"
          2. Its content contains a user_flows list with at least 2 flows (each with title and steps)
          3. Its content contains a ui_requirements list with at least 2 requirements
          4. Existing fields (id, title, description, status, order) are preserved
      - type: llm-rubric
        value: |
          Check the WORKSPACE ARTIFACTS section for actual workflow data.
          Workflow lifecycle verification for shape-section (expected stages: shape-section:intake, create-section):
          1. In "Archived Workflow (this run)", a tasks.yml for shape-section exists
          2. The tasks.yml has top-level "status: completed"
          3. The tasks.yml has "workflow: shape-section"
          4. The tasks.yml lists stages including "designbook-shape-section:intake" and "create-section"
          5. All tasks in the tasks array have "status: done"
          6. There is NO shape-section entry in "In-Progress Workflows (NOT archived — indicates failure)"

  # [07] Design Component — depends on: css-generate
  # Workflow: design-component
  # Output: components/pet-card/{pet-card.component.yml, pet-card.twig, pet-card.story.yml}
  - description: "[07] design-component"
    prompts: [design-component]
    assert:
      - type: llm-rubric
        value: |
          Check the WORKSPACE ARTIFACTS section and conversation output.
          Output file verification:
          1. The agent confirms creating a component directory under components/ (e.g. components/pet-card/)
          2. The agent mentions creating .component.yml, .twig, and .story.yml files
          3. No errors reported
      - type: llm-rubric
        value: |
          Check the WORKSPACE ARTIFACTS section for actual workflow data.
          Workflow lifecycle verification for design-component (expected stages: design-component:intake, create-component):
          1. In "Archived Workflow (this run)", a tasks.yml for design-component exists
          2. The tasks.yml has top-level "status: completed"
          3. The tasks.yml has "workflow: design-component"
          4. The tasks.yml lists stages including "designbook-design-component:intake" and "create-component"
          5. All tasks in the tasks array have "status: done"
          6. There is NO design-component entry in "In-Progress Workflows (NOT archived — indicates failure)"

  # [08] Sample Data — depends on: data-model, sections
  # Workflow: sample-data
  # Output: designbook/sections/homepage/data.yml
  - description: "[08] sample-data"
    prompts: [sample-data]
    assert:
      - type: llm-rubric
        value: |
          Check the WORKSPACE ARTIFACTS section for actual file data.
          Output file verification:
          1. A data.yml file exists under designbook/sections/ in "New Output Files"
          2. Its content contains sample records for pets (at least 5 records with real names/breeds)
          3. Its content contains sample records for shelters (at least 2 records)
          4. Each record has an "id" field
          5. Uses nested entity_type.bundle format
      - type: llm-rubric
        value: |
          Check the WORKSPACE ARTIFACTS section for actual workflow data.
          Workflow lifecycle verification for sample-data (expected stages: sample-data:intake, create-sample-data):
          1. In "Archived Workflow (this run)", a tasks.yml for sample-data exists
          2. The tasks.yml has top-level "status: completed"
          3. The tasks.yml has "workflow: sample-data"
          4. The tasks.yml lists stages including "designbook-sample-data:intake" and "create-sample-data"
          5. All tasks in the tasks array have "status: done"
          6. There is NO sample-data entry in "In-Progress Workflows (NOT archived — indicates failure)"

  # [09] Design Screen — depends on: css-generate, sections, data-model, sample-data, component
  # Workflow: design-screen
  # Output: components/*/, entity-mapping/*.jsonata, sections/homepage/*.scenes.yml
  - description: "[09] design-screen"
    prompts: [design-screen]
    assert:
      - type: llm-rubric
        value: |
          Check the WORKSPACE ARTIFACTS section and conversation output.
          Output file verification:
          1. The agent created or verified UI components under components/
          2. The agent created entity-mapping JSONata files
          3. The agent created a .scenes.yml file in a section directory
          4. pnpm build-storybook was run and succeeded
          5. No errors reported
      - type: llm-rubric
        value: |
          Check the WORKSPACE ARTIFACTS section for actual workflow data.
          Workflow lifecycle verification for design-screen (expected stages: design-screen:intake, create-component, design-screen:plan-entities, create-sample-data, design-screen:map-entity, design-screen:create-scene):
          1. In "Archived Workflow (this run)", a tasks.yml for design-screen exists
          2. The tasks.yml has top-level "status: completed"
          3. The tasks.yml has "workflow: design-screen"
          4. The tasks.yml lists all 6 stages
          5. Tasks were created across multiple stages (create-component, plan-entities, etc.)
          6. All tasks in the tasks array have "status: done"
          7. There is NO design-screen entry in "In-Progress Workflows (NOT archived — indicates failure)"

  # [10] Design Shell — depends on: css-generate, sections
  # Workflow: design-shell
  # Output: components/page/, components/header/, components/footer/, designbook/shell/shell.scenes.yml
  - description: "[10] design-shell"
    prompts: [design-shell]
    assert:
      - type: llm-rubric
        value: |
          Check the WORKSPACE ARTIFACTS section and conversation output.
          Output file verification:
          1. The agent created shell components (page, header, footer) under components/
          2. Each component has .component.yml, .twig, and .story.yml
          3. designbook/shell/shell.scenes.yml was created (check "Output Files" list)
          4. pnpm build-storybook was run and succeeded
          5. No errors reported
      - type: llm-rubric
        value: |
          Check the WORKSPACE ARTIFACTS section for actual workflow data.
          Workflow lifecycle verification for design-shell (expected stages: design-shell:intake, create-component, design-shell:create-scene):
          1. In "Archived Workflow (this run)", a tasks.yml for design-shell exists
          2. The tasks.yml has top-level "status: completed"
          3. The tasks.yml has "workflow: design-shell"
          4. The tasks.yml lists stages including "designbook-design-shell:intake", "create-component", and "create-shell-scene"
          5. Multiple tasks in create-component stage (page, header, footer)
          6. All tasks in the tasks array have "status: done"
          7. There is NO design-shell entry in "In-Progress Workflows (NOT archived — indicates failure)"

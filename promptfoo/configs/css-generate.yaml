description: Designbook workflow evaluation suite — css-generate
outputPath: promptfoo/reports/css-generate.json
prompts:
  - id: debo-css-generate
    label: css-generate
    raw: |
      You are working in the directory {{workspace}}.
      Run the /debo-css-generate workflow. Do NOT ask any questions.
      Read the designbook.config.yml for configuration. Generate CSS token files from the existing design-tokens.yml.
      Execute the workflow now.
tests:
  - description: 'debo-css-generate: PetMatch'
    vars:
      workspace: promptfoo/workspaces/debo-css-generate
    prompts:
      - css-generate
    assert:
      - type: javascript
        value: output.newFiles.some(f => f.includes('css/tokens/') && f.endsWith('.src.css'))
      - type: javascript
        value: output.archivedWorkflows['debo-css-generate']?.status === 'completed'
      - type: javascript
        value: output.archivedWorkflows['debo-css-generate']?.tasks?.every(t => t.status === 'done')
      - type: javascript
        value: Object.keys(output.pendingWorkflows).length === 0

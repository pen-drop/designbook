description: Designbook workflow evaluation suite — design-screen
outputPath: promptfoo/reports/design-screen.json
prompts:
  - id: design-screen
    label: design-screen
    raw: >
      You are working in the directory {{workspace}}.

      Run the /debo design-screen workflow for the "homepage" section. Do NOT ask any questions.

      The product is "PetMatch". Read designbook/sections/homepage/spec.section.yml for context.

      The homepage should include: a hero section, featured pets grid, search/filter area, and a call-to-action for
      shelters.

      Generate UI components, entity-mapping (JSONata files), and a scenes file.

      After generating all files, run `pnpm build-storybook` to verify everything renders.

      Execute the workflow now.
tests:
  - description: 'design-screen: PetMatch homepage'
    vars:
      workspace: promptfoo/workspaces/debo-design-screen
    prompts:
      - design-screen
    assert:
      - type: javascript
        value: output.newFiles.some(f => f.endsWith('.scenes.yml'))
      - type: javascript
        value: output.newFiles.some(f => f.includes('components/') && f.endsWith('.component.yml'))
      - type: javascript
        value: output.archivedWorkflows['design-screen']?.status === 'completed'
      - type: javascript
        value: output.archivedWorkflows['design-screen']?.tasks?.every(t => t.status === 'done')
      - type: javascript
        value: |
          return output.text.includes('build-storybook') || output.text.includes('Build completed');
      - type: javascript
        value: Object.keys(output.pendingWorkflows).length === 0

description: Designbook workflow evaluation suite — design-shell
outputPath: promptfoo/reports/design-shell.json
prompts:
  - id: design-shell
    label: design-shell
    raw: |
      You are working in the directory {{workspace}}.
      Run the /debo design-shell workflow. Do NOT ask any questions.
      The product is "PetMatch". Read the product overview and section definitions for navigation planning.
      The shell should have a top navigation bar with links to all sections, a footer, and responsive mobile menu.
      The result should be a shell.scenes.yml file under designbook/shell/ and page/header/footer components.
      After generating all files, run `pnpm build-storybook` to verify everything renders.
      Execute the workflow now.
tests:
  - description: 'design-shell: PetMatch'
    vars:
      workspace: promptfoo/workspaces/debo design-shell
    prompts:
      - design-shell
    assert:
      - type: javascript
        value: output.newFiles.some(f => f.includes('shell/') && f.endsWith('.scenes.yml'))
      - type: javascript
        value: |
          const componentDirs = output.newFiles
            .filter(f => f.includes('components/') && f.endsWith('.component.yml'))
            .map(f => f.split('/').slice(-2, -1)[0]);
          return ['page', 'header', 'footer'].every(c => componentDirs.some(d => d.includes(c)));
      - type: javascript
        value: |
          const twigFiles = output.newFiles.filter(f => f.includes('components/') && f.endsWith('.twig'));
          const storyFiles = output.newFiles.filter(f => f.includes('components/') && f.endsWith('.story.yml'));
          return twigFiles.length >= 3 && storyFiles.length >= 3;
      - type: javascript
        value: output.archivedWorkflows['design-shell']?.status === 'completed'
      - type: javascript
        value: output.archivedWorkflows['design-shell']?.tasks?.every(t => t.status === 'done')
      - type: javascript
        value: |
          return output.text.includes('build-storybook') || output.text.includes('Build completed');
      - type: javascript
        value: Object.keys(output.pendingWorkflows).length === 0

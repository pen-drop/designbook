description: Designbook workflow evaluation suite — design-tokens
outputPath: promptfoo/reports/design-tokens.json
prompts:
  - id: tokens
    label: design-tokens
    raw: |
      You are working in the directory {{workspace}}.
      Run the /debo tokens workflow. Do NOT ask any questions — use the following inputs directly:

      Product: PetMatch (pet adoption platform)
      Color palette:
      - Primary: #4F46E5 (indigo — trust/reliability)
      - Secondary: #10B981 (emerald — nature/growth)
      - Accent: #F59E0B (amber — warmth/energy)
      - Neutral: #1F2937 (dark gray)
      - Surface: #F9FAFB (light gray)
      Typography:
      - Heading: Inter
      - Body: Inter
      - Mono: JetBrains Mono

      Execute the workflow now.
tests:
  - description: 'tokens: PetMatch'
    vars:
      workspace: promptfoo/workspaces/debo tokens
    prompts:
      - design-tokens
    assert:
      - type: javascript
        value: output.newFiles.some(f => f.includes('design-tokens.yml'))
      - type: javascript
        value: output.archivedWorkflows['tokens']?.status === 'completed'
      - type: javascript
        value: output.archivedWorkflows['tokens']?.tasks?.every(t => t.status === 'done')
      - type: javascript
        value: Object.keys(output.pendingWorkflows).length === 0

description: "Quick smoke test — verify opencode SDK provider works"

outputPath: reports/test-chat.json

prompts:
  - "Say hello and tell me which model you are in one sentence and what your current directory."

providers:
  - id: opencode:sdk
    label: gemini-3-pro
    config:
      provider_id: google
      model: antigravity-gemini-3-pro
      timeout: 120000
      tools:
        read: true
        skill: true

  - id: opencode:sdk
    label: claude-opus-4-6
    config:
      provider_id: google
      model: antigravity-claude-opus-4-6-thinking
      timeout: 120000
      tools:
        read: true
        skill: true


defaultTest:
  options:
    provider: opencode:google/antigravity-gemini-3-pro

tests:
  - description: "Model identifies itself"
    assert:
      - type: llm-rubric
        value: "The response contains a greeting and mentions which AI model is responding."

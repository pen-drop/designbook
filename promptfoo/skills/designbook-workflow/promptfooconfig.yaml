description: "designbook skill smoke test — verifies bootstrap + workflow create"

outputPath: reports/designbook.json

prompts:
  - id: workflow-bootstrap
    label: bootstrap
    raw: |
      You are working in the directory {{workspace}}.

      Load skill `designbook` and perform ONLY the following steps — do not run intake or execute tasks:

      1. Run Phase 0 bootstrap (find designbook.config.yml, eval the config command)
      2. If any vision workflows exist, abandon them: workflow abandon --workflow <each-name>
      3. Run: workflow create --workflow vision --workflow-file .agents/skills/designbook/vision/workflows/vision.md
      4. Report back: the workflow name returned (from .name), and the list of stage IDs resolved (from .stages[].id or .stage_resolved keys)

      Stop after reporting. Do NOT proceed to intake or task execution.

providers:
  - id: file://../../providers/claude-cli.mjs
    label: claude-opus-4-6
    config:
      model: claude-opus-4-6
      timeout: 120000
      max_turns: 20

defaultTest:
  options:
    provider:
      id: file://../../providers/claude-cli.mjs
      config:
        model: claude-opus-4-6
        timeout: 120000
        max_turns: 20

tests:
  - description: "designbook: bootstrap + create resolves stages"
    vars:
      workspace: promptfoo/workspaces/designbook-bootstrap
    assert:
      - type: llm-rubric
        value: |
          The agent executed Phase 0 bootstrap of the designbook skill and ran `workflow create`.
          Verify from the conversation output:
          1. The agent ran the bootstrap bash commands (found designbook.config.yml, evaled config)
          2. The agent ran `workflow create --workflow vision`
          3. The agent reports a workflow name (a string like "vision-XXXX")
          4. The agent reports at least 2 resolved stages
          5. The output does NOT indicate errors or failures

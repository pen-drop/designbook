# Vision concern schemas

Vision:
  type: object
  required: [product_name, description]
  properties:
    product_name: { type: string }
    description: { type: string }
    problems:
      type: array
      items:
        type: object
        properties:
          title: { type: string }
          solution: { type: string }
    features:
      type: array
      items: { type: string }
    design_reference:
      type: object
      properties:
        type: { type: string }
        url: { type: string }
        label: { type: string }

# Design concern schemas — referenced via $ref from task frontmatter

Check:
  type: object
  required: [story_id, breakpoint, region]
  properties:
    story_id: { type: string }
    breakpoint: { type: string }
    region: { type: string, enum: [full, header, footer] }
    threshold: { type: number, default: 0 }
    selector: { type: string }

Issue:
  type: object
  required: [severity, description]
  properties:
    id: { type: string }
    story_id: { type: string }
    checkKey: { type: string }
    scene_id: { type: string }
    severity: { type: string, enum: [critical, major, minor] }
    description: { type: string }
    file_hint: { type: string }
    check: { type: string }
    source: { type: string }
    details: { type: string }
    properties:
      type: array
      items:
        type: object
        properties:
          property: { type: string }
          expected: { type: string }
          actual: { type: string }

Component:
  type: object
  required: [component, group]
  properties:
    component: { type: string }
    slots:
      type: array
      items: { type: string }
      default: []
    group: { type: string }
    description: { type: string }
    design_hint: { type: object }

Scene:
  type: object
  required: [scene]
  properties:
    scene: { type: string }

Reference:
  type: object
  required: [type, url]
  properties:
    type: { type: string }
    url: { type: string }
    breakpoint: { type: string }
    threshold: { type: number }
    title: { type: string }

EntityMapping:
  type: object
  required: [entity_type, bundle, view_mode]
  properties:
    entity_type: { type: string }
    bundle: { type: string }
    view_mode: { type: string }

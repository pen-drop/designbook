# Design concern schemas — referenced via $ref from task frontmatter

# CaptureStep / CaptureState are defined first and reused via YAML anchors
# (*CaptureStep / *CaptureState) rather than `$ref: #/…`. The anchors expand to
# inline copies at YAML-load time, so the result-schema validator never has to
# resolve a cross-definition `$ref` — which it cannot do when it roots a single
# definition (e.g. DesignReference) in isolation.
CaptureStep: &CaptureStep
  type: object
  title: Capture Step
  description: >
    One generic browser interaction performed before a screenshot is taken, used
    to drive an element into a non-rest state. Source-agnostic — the same shape
    applies to a reference page or a Storybook story.
  required: [action]
  properties:
    action:
      type: string
      description: Interaction to perform.
      enum: [click, hover, focus, wait]
    selector:
      type: string
      description: >
        CSS selector the action targets. Required for click/hover/focus; omitted
        for a bare wait.
    timeout:
      type: integer
      default: 500
      description: Milliseconds to let the UI settle after the action.

CaptureState: &CaptureState
  type: object
  title: Capture State
  description: >
    A named interaction condition under which a screenshot is captured. `rest`
    is the implicit default (no steps — the element as first rendered); any other
    state is reached by running `steps` in order. Names are generic UI conditions
    (rest, expanded, open, …), never component- or site-specific.
  required: [name]
  properties:
    name:
      type: string
      pattern: "^[a-z][a-z0-9-]*$"
      description: >
        Generic state name. `rest` is reserved for the default un-interacted state.
      examples: [rest, expanded, open, active]
    steps:
      type: array
      default: []
      description: Interactions to reach this state from rest. Empty for `rest`.
      items: *CaptureStep

BreakpointId:
  type: string
  description: >
    Viewport breakpoint identifier from `design-tokens.yml` (sm, md, lg, xl, ...).
    Determines the viewport width for capture/verify operations.
  examples: [sm, md, lg, xl]

RegionId:
  type: string
  enum: [full, header, footer]
  description: >
    Capture region of the page. `full` = entire page,
    `header`/`footer` = only the landmark area for targeted verification.

ReferenceFolder:
  type: string
  description: >
    Path to a scene's verification material — contains `extract.json`
    (reference structure) and reference screenshots per breakpoint/region/state.
    Format: `{breakpoint}--{region}{file_suffix}.png` — `rest` state has an empty
    suffix (`xl--full.png`), non-rest states append `--{state}` (`xl--header--expanded.png`).
  examples: ["$DESIGNBOOK_DATA/references/hero", "/tmp/refs/article"]

Check:
  type: object
  title: Verification Check
  description: >
    Definition of a single verification check — links a Storybook story
    to a reference asset for a specific breakpoint/region.
  required: [story_id, breakpoint, region]
  properties:
    story_id:
      $ref: ../scenes/schemas.yml#/StoryId
    breakpoint:
      $ref: "#/BreakpointId"
    region:
      $ref: "#/RegionId"
    threshold:
      type: number
      default: 0.8
      description: Maximum percentage deviation (0–1) before the check fails.
    selector:
      type: string
      description: >
        Optional CSS selector — limits the capture to a subregion of the
        story render. When empty, the full story viewport area is used.
    type:
      type: string
      description: Check type (e.g. `screenshot`, `dom`). Determines the capture strategy.
    state:
      type: string
      default: rest
      description: >
        Interaction state this check captures (see `#/CaptureState`). `rest` is the
        default un-interacted condition — equivalent to a check with no state, so
        existing breakpoint × region checks are unchanged.
    steps:
      type: array
      default: []
      description: >
        Interactions to run against the render before capturing, reaching the
        check's `state`. Denormalized from the element's `CaptureState.steps` so a
        check is self-contained. Empty for `rest`.
      items: *CaptureStep
    file_suffix:
      type: string
      default: ""
      description: >
        Filename suffix appended after `{breakpoint}--{region}` so each state writes
        a distinct screenshot — `""` for `rest` (keeps the canonical
        `{bp}--{region}.png` name, no regression), `--{state}` otherwise. Computed
        by setup-compare; capture paths interpolate it.

CompareArtifact:
  type: object
  title: Compare Artifact
  description: >
    Structured result of one screenshot compare check. One item is emitted per
    `(breakpoint, region, state)` triple so outtake can summarize visual review
    without rerunning capture or compare.
  required: [story_id, breakpoint, region, passed]
  properties:
    story_id:
      $ref: ../scenes/schemas.yml#/StoryId
    breakpoint:
      $ref: "#/BreakpointId"
    region:
      $ref: "#/RegionId"
    state:
      type: string
      default: rest
      description: Interaction state compared (see `#/CaptureState`). `rest` = default.
    passed:
      type: boolean
      description: True when this compare check passed within its configured threshold.
    diff_path:
      type: string
      description: Path to the diff/report artifact for this check when one was written.
    screenshot_path:
      type: string
      description: Path to the captured Storybook screenshot used in the compare.
    reference_path:
      type: string
      description: Path to the reference screenshot used in the compare.
    diff_percent:
      type: number
      description: Measured visual deviation ratio for this check when available.
    severity:
      type: string
      enum: [pass, minor, major, critical]
      description: >
        Deterministic severity from the compare-images CLI, derived from pixel
        ratio, spatial extent, and dimension drift together. Carried onto the
        artifact so outtake scores by severity, not pixel ratio alone — a small
        but widely-spread shift (low diff_percent, high extent) still lands as
        `major`/`critical` here.

VerifyResult:
  type: object
  title: Verify Result
  description: >
    One verify-capture run's measurement. `score` is the severity sum
    (critical×3 + major×2 + minor×1) over all checks — lower is better,
    0 = perfect. Pixel diff and per-check breakdown sit alongside so callers
    see both structural and visual fidelity.
  required: [score, checks]
  properties:
    score: { type: integer, minimum: 0, examples: [17],
      description: "Σ(critical×3 + major×2 + minor×1) over all checks. 0 = perfect." }
    avg_diff_percent: { type: number, examples: [0.21], description: Mean pixel deviation ratio across checks. }
    max_diff_percent: { type: number, examples: [0.44], description: Worst-case pixel deviation across checks. }
    passed: { type: integer, examples: [2], description: Checks that passed their threshold. }
    total:  { type: integer, examples: [4], description: Total checks. }
    issues:
      type: object
      description: Aggregate issue counts by severity over all checks.
      properties:
        critical: { type: integer, examples: [2] }
        major:    { type: integer, examples: [4] }
        minor:    { type: integer, examples: [3] }
    checks:
      type: array
      description: Per-check breakdown (one per breakpoint × region).
      items:
        type: object
        required: [breakpoint, region, score, passed]
        properties:
          breakpoint:   { $ref: "#/BreakpointId" }
          region:       { $ref: "#/RegionId" }
          score:        { type: integer, minimum: 0 }
          passed:       { type: boolean }
          diff_percent: { type: number }
          critical:     { type: integer }
          major:        { type: integer }
          minor:        { type: integer }
    tokens:
      type: object
      description: This run's agent-reported LLM tokens. Best-effort; absent on headless runs.
      properties: { input: { type: integer }, output: { type: integer } }

ScoreReport:
  type: object
  title: Score Report
  description: >
    A design-verify run: first_shot (before any fix) and final (after the
    single verify-fix pass), each a full VerifyResult. delta = first_shot.score
    − final.score (positive = improvement; lower score is better).
  required: [first_shot, final, delta]
  properties:
    first_shot: { $ref: "#/VerifyResult" }
    final:      { $ref: "#/VerifyResult" }
    delta:      { type: integer, examples: [11], description: first_shot.score − final.score. }
    tokens:
      type: object
      description: LLM tokens summed across the capture + fix subagents. Best-effort.
      properties: { input: { type: integer }, output: { type: integer } }

StoryMeta:
  type: object
  title: Story Meta
  description: >
    On-disk format of `stories/{storyId}/meta.yml` — per-story reference
    configuration (source + breakpoints/regions). Checks and issues are
    runtime-only and never persisted here.
  properties:
    reference:
      type: object
      properties:
        source:
          type: object
          description: Origin of the design reference for this story.
          properties:
            url: { type: string }
            origin: { type: string, description: "Provenance tag (e.g. `figma`, `manual`, `url`)." }
            screenId: { type: string }
            hasMarkup: { type: boolean }
        breakpoints:
          type: object
          description: >
            Map of breakpoint id → per-breakpoint configuration. Keys must match
            identifiers from `design-tokens.yml` (see `#/BreakpointId`).
          additionalProperties:
            type: object
            properties:
              threshold:
                type: number
                description: Default maximum percentage deviation for regions of this breakpoint.
              regions:
                type: object
                description: Map of region id → capture configuration.
                additionalProperties:
                  type: object
                  properties:
                    selector:
                      type: string
                      description: CSS selector for this region. Empty = full viewport.
                    threshold:
                      type: number
                      description: Per-region override of the breakpoint threshold.
                    states:
                      type: object
                      description: >
                        Map of state name → capture configuration for this region.
                        Absent ⇒ implicit `{ rest: {} }` (rest-only, no interaction).
                        Lets a story persist its interaction states so re-runs
                        rebuild the same state checks without re-deriving them.
                      additionalProperties:
                        type: object
                        properties:
                          steps:
                            type: array
                            default: []
                            items: *CaptureStep

Issue:
  type: object
  required: [severity, description]
  properties:
    id: { type: string }
    story_id: { type: string }
    checkKey: { type: string }
    severity: { type: string, enum: [critical, major, minor] }
    description: { type: string }
    file_hint: { type: string }
    check: { type: string }
    source: { type: string }
    details: { type: string }
    properties:
      type: array
      items:
        type: object
        properties:
          property: { type: string }
          expected: { type: string }
          actual: { type: string }

Component:
  type: object
  required: [component, group]
  properties:
    component: { type: string }
    slots:
      type: array
      items: { type: string }
      default: []
    group: { type: string }
    description: { type: string }
    design_hint:
      $ref: "#/DesignHint"
    variants:
      type: array
      default: []
      items:
        $ref: "#/Variant"

Variant:
  type: object
  required: [id]
  properties:
    id:
      type: string
      pattern: "^[A-Za-z_][A-Za-z0-9_]*$"
      description: >
        Variant identifier in snake_case. Used as the story filename segment
        (`<component>.<id>.story.yml`) and as the key in `.component.yml` `variants:`.
        Hyphens are forbidden — the segment becomes a JS export name in the
        generated story (`mark-only` → `export const Mark-only`, a SyntaxError)
        and must satisfy the same identifier pattern as prop/slot keys.
      examples: [main, footer, vertical, horizontal, mark_only]
    title:
      type: string
      description: Human-readable variant label shown in Storybook.
    description:
      type: string
      description: One-sentence summary of the variant's distinguishing visual or behavioural trait.

Reference:
  type: object
  required: [type, url]
  properties:
    type: { type: string }
    url: { type: string }
    breakpoint: { type: string }
    threshold: { type: number }
    title: { type: string }

EntityMapping:
  type: object
  required: [entity_type, bundle, view_mode]
  properties:
    entity_type: { type: string }
    bundle: { type: string }
    view_mode: { type: string }

DesignReference:
  type: object
  required: [source, extracted, strategy]
  properties:
    source: { type: string }
    extracted: { type: string }
    strategy: { type: string, enum: [vision, playwright+vision] }
    assets_dir:
      type: string
      description: >
        Directory (relative to the reference folder) where downloaded static assets
        (logos, icons, SVGs) are stored. Typically `assets/`.
      examples: [assets]
    fonts:
      type: array
      description: >
        Web fonts the reference renders text with. Each family that is not a
        Google/system font must be downloaded — see `files[]`. Metadata alone
        (family/weights) is insufficient: a self-hosted family with no `files[]`
        leaves downstream CSS with an unresolvable family and a silent serif
        fallback. This is the concrete failure mode `files[]` exists to prevent.
      items:
        type: object
        required: [family, source]
        properties:
          family: { type: string, description: "Exact font-family name as used in @font-face / CSS (e.g. \"Reef\", \"Inter\")." }
          source:
            type: string
            description: >
              Where the font is served from. `self-hosted` and `adobe`/`other`
              families MUST be downloaded into `files[]`; `google` is fetched
              later by css-generate; `system` needs no download.
            enum: [self-hosted, google, adobe, system, other]
          weights: { type: array, items: { type: number }, description: "Distinct numeric weights observed (e.g. [400, 700])." }
          styles: { type: array, items: { type: string }, description: "Distinct styles observed (e.g. [normal, italic])." }
          files:
            type: array
            description: >
              Downloaded font binaries for this family. Required when `source`
              is not `google` or `system` and the binary URL was reachable.
              Empty only when the font could not be downloaded.
            items:
              type: object
              required: [local_path]
              properties:
                weight: { type: number, description: "Weight this file provides." }
                style: { type: string, description: "Style this file provides (normal, italic).", examples: [normal, italic] }
                format: { type: string, description: "Font format.", examples: [woff2, woff, ttf] }
                src_url: { type: string, description: "Resolved absolute URL the binary was downloaded from." }
                local_path:
                  type: string
                  description: >
                    Path (relative to the reference folder, typically under
                    `{assets_dir}/fonts/`) where the binary was written.
                  examples: ["assets/fonts/Reef-Regular.woff2"]
    typography:
      type: array
      items:
        type: object
        properties:
          element: { type: string }
          font_family: { type: string }
          font_size: { type: string }
          line_height: { type: string }
          letter_spacing: { type: string }
          font_weight: { type: number }
          color: { type: string }
    colors:
      type: array
      items:
        type: object
        properties:
          hex: { type: string }
          usage: { type: array, items: { type: string } }
    css_variables:
      type: array
      items:
        type: object
        properties:
          name: { type: string }
          value: { type: string }
    spacing:
      type: object
      properties:
        container_max_width: { type: string }
        edge_padding: { type: string }
        section_gap: { type: string }
        values: { type: array, items: { type: string } }
    landmarks:
      type: object
      properties:
        header:
          type: object
          properties:
            rows:
              type: array
              items:
                type: object
                properties:
                  tag: { type: string }
                  bg: { type: string }
                  height: { type: string }
                  padding: { type: string }
                  content: { type: string }
                  layout: { type: string }
                  gap: { type: string }
        footer:
          type: object
          properties:
            rows:
              type: array
              items:
                type: object
                properties:
                  tag: { type: string }
                  bg: { type: string }
                  height: { type: string }
                  padding: { type: string }
                  content: { type: string }
                  layout: { type: string }
                  gap: { type: string }
    interactive:
      type: array
      items:
        type: object
        properties:
          element: { type: string }
          selector: { type: string }
          bg: { type: string }
          color: { type: string }
          border_radius: { type: string }
          padding: { type: string }
          font: { type: string }
          box_shadow: { type: string }
          border: { type: string }
          behavior:
            type: string
            description: >
              Interaction pattern when the element does more than restyle on
              hover/focus. Drives which non-rest states exist and signals that the
              component needs behavior (JS or a native disclosure element).
            enum: [toggle, disclosure, overlay, menu, tabs, accordion]
          target:
            type: string
            description: >
              Selector of the element the behavior shows/hides/activates (the
              panel, menu, or overlay the trigger controls).
          aria:
            type: string
            default: aria-expanded
            description: ARIA attribute on the trigger that flips between states.
          states:
            type: array
            description: >
              Capture states this element exposes. Defaults to rest-only; add the
              activated state(s) so the open/expanded condition can be built and
              verified.
            default: [{ name: rest }]
            items: *CaptureState
    tokens:
      type: object
      properties:
        colors:
          type: object
        fonts:
          type: object
        spacing:
          type: array
          items: { type: string }
        radii:
          type: array
          items: { type: string }
    navigation:
      type: array
      description: Navigation structures detected in the design reference.
      items:
        type: object
        properties:
          role:
            type: string
            description: "Navigation context: main, footer, breadcrumb, sidebar, utility."
            enum: [main, footer, breadcrumb, sidebar, utility]
          items:
            type: array
            description: Ordered list of navigation entries.
            items:
              type: object
              properties:
                label: { type: string }
                url: { type: string }
                active: { type: boolean, description: "True if this item appears as the active/current page." }
                children:
                  type: array
                  description: Sub-navigation items (one level deep).
                  items:
                    type: object
                    properties:
                      label: { type: string }
                      url: { type: string }
    images:
      type: array
      description: Static images and brand assets detected in the design reference (logos, icons, illustrations).
      items:
        type: object
        required: [url, role]
        properties:
          url: { type: string, description: "Source URL or path of the image." }
          role:
            type: string
            description: "Visual role of the image."
            enum: [logo, icon, hero, background, illustration, avatar, other]
          alt: { type: string, description: "Alt text or accessible label if present." }
          location: { type: string, description: "Where the image appears: header, footer, main, sidebar." }
          width: { type: string, description: "Rendered width (px or CSS value)." }
          height: { type: string, description: "Rendered height (px or CSS value)." }
          local_path:
            type: string
            description: >
              Path (relative to the Storybook `public/` or configured static dir)
              where the asset has been downloaded. Empty if the asset could not be
              downloaded or is decorative-only. Scenes and components MUST reference
              this path (e.g. `<img src="/logo.svg">`) instead of text placeholders
              when it is set.
            examples: ["/logo.svg", "/assets/partner-bmbf.svg"]
    components:
      type: array
      description: UI components identified in the design reference.
      items:
        type: object
        properties:
          name:
            type: string
            description: "Component type as it would be named in the design system (e.g. button, card, navigation, hero, badge)."
          count:
            type: number
            description: Number of distinct instances detected.
          location:
            type: array
            description: "Regions where the component appears."
            items: { type: string }
          variants:
            type: array
            description: Visual variants observed (e.g. primary/secondary, filled/outline, horizontal/vertical).
            items: { type: string }
          props:
            type: object
            description: Key visual properties extracted from the observed instances (colors, sizes, labels, etc.).
    sections:
      type: array
      description: >
        Page-level content zones between header and footer (hero, features grid, CTA, testimonials, etc.).
        Provides layout context for story structure decisions.
      items:
        type: object
        properties:
          type:
            type: string
            description: "Section type (e.g. hero, features, cta, testimonials, pricing, faq, gallery, contact)."
          bg: { type: string, description: "Background color or gradient." }
          layout:
            type: string
            description: "Layout pattern (e.g. full-width, two-column, grid-3, centered)."
          content_summary:
            type: string
            description: "One-sentence description of what this section contains."
          order:
            type: integer
            description: "Top-to-bottom position of the section on the page (1-based)."
    shadows:
      type: array
      description: >
        Elevation / box-shadow tokens detected in the design reference.
        Maps to CSS custom properties (e.g. --shadow-card, --shadow-modal).
      items:
        type: object
        properties:
          value: { type: string, description: "Full CSS box-shadow value." }
          usage:
            type: array
            description: "Contexts where this shadow appears (e.g. card, modal, dropdown, button, header)."
            items: { type: string }
          token: { type: string, description: "Suggested CSS custom property name (e.g. --shadow-sm)." }
    forms:
      type: array
      description: >
        Form patterns detected in the design reference — input fields, labels, error states, etc.
        Extracted per distinct form or form section observed.
      items:
        type: object
        properties:
          context:
            type: string
            description: "Where the form appears or its purpose (e.g. login, newsletter, contact, search)."
          fields:
            type: array
            description: "Detected input fields."
            items:
              type: object
              properties:
                type: { type: string, description: "Input type (text, email, password, select, checkbox, radio, textarea)." }
                label_position: { type: string, description: "Label placement (above, inline, placeholder-only)." }
                style:
                  type: object
                  properties:
                    bg: { type: string }
                    border: { type: string }
                    border_radius: { type: string }
                    padding: { type: string }
                    font_size: { type: string }
          error_color: { type: string, description: "Color used for validation error messages." }
          submit_button: { type: string, description: "Description of the submit CTA style." }
    breakpoints:
      type: array
      description: >
        Responsive breakpoints observed in the design reference (e.g. when multiple viewport
        widths are shown). Maps detected px values to design-token breakpoint identifiers.
      items:
        type: object
        properties:
          px:
            type: integer
            description: "Viewport width in pixels at which the layout changes."
          token_id:
            type: string
            description: "Suggested breakpoint token identifier (e.g. sm, md, lg, xl)."
          description:
            type: string
            description: "What changes at this breakpoint (e.g. nav collapses, grid switches to single column)."

DesignHint:
  type: object
  properties:
    landmark: { type: string }
    rows:
      type: array
      items:
        type: object
        properties:
          bg: { type: string }
          height: { type: string }
          layout: { type: string }
          gap: { type: string }
          padding: { type: string }
          content: { type: string }
    fonts:
      type: object
    interactive:
      type: array
      items:
        type: object
        properties:
          element: { type: string }
          bg: { type: string }
          color: { type: string }
          border_radius: { type: string }
          padding: { type: string }
          box_shadow: { type: string }
    tokens:
      type: object

DesignWorkflowOutput:
  type: object
  title: Design Workflow Output
  description: >
    Design-workflow-specific outtake payload. It builds on the global
    `WorkflowOutput` contract defined in `designbook/workflow/schemas.yml` and
    adds compare-oriented fields so shell/screen workflows can archive visual
    quality information alongside generic run metrics.
  required: [success_rate]
  properties:
    success_rate:
      type: number
      minimum: 0
      maximum: 1
      description: >
        Computed deterministically from compare_artifacts (never an AI judgment):
        success_rate = 1 − max(effective_deviation) over all artifacts, clamped to [0, 1].
        Per artifact, effective_deviation = max(diff_percent, severity_floor[severity])
        with floors pass→0.0, minor→0.05, major→0.20, critical→0.50, so the
        deterministic severity (pixel ratio + spatial extent + dimension drift) counts,
        not pixel ratio alone — a widely-spread shift with low diff_percent but
        severity major/critical still lowers the score. diff_percent and severity both
        come from the compare-images CLI, so identical screenshots yield the same score
        regardless of model. Edge cases: no design reference configured (reference_folder
        empty, no checks) → 1.0; a reference was set but compare_artifacts is empty
        (compare expected, produced nothing) → 0.0; an artifact missing diff_percent or
        severity, or an expected check absent from the matrix → effective_deviation 1.0
        for that check (a failed measurement never raises the score). 0 = no match,
        1 = perfect match. The engine derives flow_rate from this after archiving and
        never overwrites it.
    flow_rate:
      type: number
      description: >
        Composite-Score für den Research-Loop. Wird von der Engine deterministisch
        beim Archivieren berechnet: flow_rate = success_rate * 100 - friction
        (errors*5 + retries*2 + unresolved*3). Wird nie vom AI geschrieben.
    summary:
      type: string
      description: Short human-readable outcome summary for the design workflow.
    warnings:
      type: array
      items:
        type: string
    artifacts:
      type: object
      additionalProperties: true
    metrics:
      type: object
      description: >
        Prozessmetriken aus dbo.log — werden von der Engine beim Archivieren
        deterministisch befüllt. Darf vom AI nicht geschrieben werden.
      properties:
        errors:
          type: integer
          minimum: 0
          description: Anzahl CLI-Fehler (error-Einträge in dbo.log).
        retries:
          type: integer
          minimum: 0
          description: Anzahl Retry-Wiederholungen (retry-groups count - 1 pro Gruppe).
        unresolved:
          type: integer
          minimum: 0
          description: Anzahl unresolved-Einträge in dbo.log.
    compare_passed:
      type: boolean
      description: >
        True when the final visual comparison is considered passing for this
        workflow. This can remain false even when the workflow completed
        technically.
    diff_path:
      type: string
      description: >
        Path to the final visual diff artifact when one was produced. Leave
        empty when no diff exists yet.
    reference_folder:
      $ref: "#/ReferenceFolder"
    issues_count:
      type: integer
      minimum: 0
      description: Number of unresolved design issues considered by the outtake.
    breakpoints_checked:
      type: array
      description: Breakpoints covered by the final compare/review pass.
      items:
        $ref: "#/BreakpointId"
    regions_checked:
      type: array
      description: Regions covered by the final compare/review pass.
      items:
        $ref: "#/RegionId"

RegionProperties:
  type: object
  title: Region Properties
  description: |
    Authoritative element properties for the region the current task covers.
    Produced by the region-properties code resolver from the rendered DOM.
    When `matched_via !== "none"`, `style` values are ground truth — markup
    and CSS MUST use them where present. Falls back to extract.json + design
    hints only for properties not in the bag.
  required: [matched_via, nodes]
  properties:
    matched_via:
      type: string
      description: Which heuristic located the region root.
      enum: [role, heading, label, bbox, none]
    root_id:
      type: string
      description: ID of the region root inside `nodes`. Absent when matched_via === "none".
      examples: ["n_8a3f21bc"]
    base_breakpoint:
      type: string
      description: >
        Smallest captured breakpoint — the mobile-first base for node `style`.
        Larger-breakpoint deltas live in each node's `overrides`. Absent for
        single-viewport captures.
      examples: [sm]
    nodes:
      type: array
      description: All PropertyNodes in the region subtree. Hierarchy via parent_id / child_ids. Empty when matched_via === "none".
      items:
        $ref: "#/PropertyNode"

PropertyNode:
  type: object
  title: Property Node
  description: One visible element from the captured source. Source-agnostic — a future Figma walker would return the same shape.
  required: [id, child_ids, label, kind, bbox, style, source]
  properties:
    id:
      type: string
      description: Deterministic node ID. Walker-chosen (DOM uses hash of dom_path + bbox).
      examples: ["n_8a3f21bc"]
    parent_id:
      type: string
      description: ID of this node's parent PropertyNode. Absent for the root — walkers MUST omit the key for the root node rather than emit null.
      examples: ["n_8a3f21bc"]
    child_ids:
      type: array
      description: Child node IDs in reading / visual order.
      items: { type: string }
    label:
      type: string
      description: Human-readable name. Heading text, layer name, ARIA label, or text content.
      examples: ["Site Header", "Buy now", "Pricing"]
    kind:
      type: string
      description: Coarse element category — drives consumer reasoning even when specific style fields are missing.
      enum: [section, container, text, heading, image, icon, button, input, link, list, list-item, form, media]
    role:
      type: string
      description: Normalized semantic role. Strong for DOM (HTML5 landmarks + ARIA). Optional.
      enum: [banner, navigation, main, contentinfo, search, form, complementary, region]
    heading_context:
      type: string
      description: Nearest preceding section / heading text. The strongest source-agnostic anchor for region matching.
      examples: ["Pricing", "Frequently asked questions"]
    bbox:
      type: object
      description: Pixel coordinates relative to the viewport.
      required: [x, y, width, height]
      properties:
        x: { type: number, description: "Left edge in px" }
        y: { type: number, description: "Top edge in px" }
        width: { type: number, description: "Width in px" }
        height: { type: number, description: "Height in px" }
    text:
      type: string
      description: Visible text content, trimmed, max 200 chars.
    href:
      type: string
      description: Absolute or root-relative URL for link nodes.
    src:
      type: string
      description: Asset URL or path for media nodes.
    alt:
      type: string
      description: Alt text or accessible name.
    style:
      type: object
      title: Curated Style
      description: Source-agnostic curated style block. Walkers map their native properties (CSS computed style, Figma layout/fills/typography) onto this shape.
      required: [padding, margin, background, foreground]
      properties:
        layout:
          type: string
          description: Layout primitive.
          enum: [flex-row, flex-col, grid, stack, absolute, none]
        main_axis_align:
          type: string
          description: Main-axis alignment.
          enum: [start, center, end, space-between, space-around, space-evenly]
        cross_axis_align:
          type: string
          description: Cross-axis alignment.
          enum: [start, center, end, stretch, baseline]
        gap:
          type: string
          description: Gap between flex / grid items, normalized in px.
          examples: ["16px", "8px 24px"]
        padding:
          type: string
          description: Normalized "<top> <right> <bottom> <left>" or shorthand.
          examples: ["0 32 0 32", "16"]
        margin:
          type: string
          description: Same normalization as padding.
        border:
          type: string
          description: Border shorthand.
          examples: ["1px solid #e5e7eb"]
        border_radius:
          type: string
          examples: ["4px", "9999px"]
        background:
          type: string
          description: Resolved hex color, or url() / image ref.
          examples: ["#ffffff", "linear-gradient(...)", "url(/hero.jpg)"]
        foreground:
          type: string
          description: Text or icon color (resolved hex).
          examples: ["#111111"]
        font_family:
          type: string
          examples: ["Inter, sans-serif"]
        font_size:
          type: string
          examples: ["16px", "1.125rem"]
        font_weight:
          type: string
          examples: ["400", "600"]
        line_height:
          type: string
          examples: ["1.5", "24px", "normal"]
        letter_spacing:
          type: string
          examples: ["normal", "0.02em", "0.5px"]
        text_transform:
          type: string
          enum: [uppercase, lowercase, capitalize]
    source:
      type: object
      title: Source Locator
      description: Walker-specific identification. `locator` is opaque to consumers; `raw` carries the unmapped native data when deep dives are needed.
      required: [locator]
      properties:
        locator:
          type: string
          description: Walker-defined — DOM path for the URL walker.
          examples: ["body > header"]
        raw:
          type: object
          description: Walker-specific extra fields. Opaque to consumers — only loaded when explicitly requested. Keys vary by walker.
          additionalProperties: true
    overrides:
      type: object
      description: >
        Per-breakpoint deviations from the mobile-first base. Each key is a
        breakpoint name (e.g. `sm`, `xl`); values list what changes at that
        breakpoint. Absent when the node is identical across breakpoints.
        Consume as responsive utilities: base `style` → base classes,
        `overrides.<bp>` → the matching `<bp>:` prefix.
      additionalProperties:
        type: object
        properties:
          hidden:
            type: boolean
            description: Element not rendered at this breakpoint; `false` on a base-hidden node means it is revealed here.
          style:
            type: object
            description: Only the style properties that differ from the base `style` at this breakpoint.
          bbox:
            type: object
            description: Bounding box at this breakpoint when it differs from the base.
            properties:
              x: { type: number, description: "Left edge in px" }
              y: { type: number, description: "Top edge in px" }
              width: { type: number, description: "Width in px" }
              height: { type: number, description: "Height in px" }
      examples:
        - { xl: { hidden: false, style: { layout: flex-row } } }

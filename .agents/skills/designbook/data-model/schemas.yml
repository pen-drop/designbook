# Data model concern schemas
# Content has a fixed schema (entity_type → bundle → purpose, view_modes, fields).
# Config stays open — each config type brings its own schema via extends/constrains.

DataModel:
  type: object
  required: [content]
  properties:
    content:
      type: object
      additionalProperties:
        type: object
        additionalProperties:
          type: object
          properties:
            purpose: { type: string }
            view_modes:
              type: object
              additionalProperties:
                type: object
                required: [template]
                properties:
                  template: { type: string }
                  label:
                    type: string
                    description: Human-readable name for a custom view mode, e.g. "Card". Required by sync-to when emitting a core.entity_view_mode.<entity_type>.<mode> definition for a non-standard view mode.
                  settings: { type: object, additionalProperties: true }
                additionalProperties: false
            fields:
              type: object
              additionalProperties:
                type: object
                required: [type]
                properties:
                  type: { type: string }
                  title: { type: string }
                  description: { type: string }
                  required: { type: boolean }
                  multiple: { type: boolean }
                  settings: { type: object, additionalProperties: true }
                  sample_template:
                    type: object
                    required: [template]
                    properties:
                      template: { type: string }
                      settings: { type: object, additionalProperties: true }
                    additionalProperties: false
          additionalProperties: true
    config:
      type: object
      additionalProperties: true

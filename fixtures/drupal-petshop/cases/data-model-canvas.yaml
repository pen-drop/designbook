config: canvas.yml

fixtures:
  - vision

prompt: >
  You are working in the directory {{workspace}}.
  Run the /debo data-model workflow. Do NOT ask any questions.
  The product is "PetMatch". Read the product overview at designbook/product/product-overview.md.
  Create an article (bundle article) and landing page  (bundle: page, with canvas)
  Execute the workflow now.

assert:
  - type: javascript
    value: output.newFiles.includes('designbook/data-model.yml')
  - type: javascript
    value: output.archivedWorkflows['data-model']?.status === 'completed'
  - type: javascript
    value: output.archivedWorkflows['data-model']?.tasks?.every(t => t.status === 'done')
  - type: javascript
    value: |
      const c = output.fileContents['designbook/data-model.yml']?.content;
      return c?.canvas_page && Object.keys(c.canvas_page).length >= 1;
  - type: javascript
    value: |
      const c = output.fileContents['designbook/data-model.yml']?.content;
      if (!c?.canvas_page) return false;
      return Object.values(c.canvas_page).some(bundle => {
        const fields = bundle.fields || {};
        return Object.values(fields).some(f => f.type === 'component_tree');
      });
  - type: javascript
    value: |
      const c = output.fileContents['designbook/data-model.yml']?.content;
      return !!c?.canvas_page?.page;
  - type: javascript
    value: |
      const vm = output.fileContents['designbook/data-model.yml']?.content?.canvas_page?.page?.view_modes;
      return vm?.full?.template === 'canvas';
  - type: javascript
    value: |
      const vm = output.fileContents['designbook/data-model.yml']?.content?.canvas_page?.page?.view_modes;
      return vm?.teaser?.template === 'field-map';
  - type: javascript
    value: |
      const fields = output.fileContents['designbook/data-model.yml']?.content?.canvas_page?.page?.fields || {};
      return Object.values(fields).some(f => f.type === 'component_tree' && f.sample_template?.template === 'canvas');
  - type: javascript
    value: |
      const c = output.fileContents['designbook/data-model.yml']?.content;
      return !c?.block_content;
  - type: javascript
    value: |
      const c = output.fileContents['designbook/data-model.yml']?.content;
      if (!c?.node) return true;
      return !Object.values(c.node).some(bundle => {
        const fields = bundle.fields || {};
        return Object.values(fields).some(f => f.type === 'layout_builder__layout');
      });
  - type: javascript
    value: |
      const loaded = output.archivedWorkflows['data-model']?.stage_loaded || {};
      return Object.values(loaded).some(s => s.rules?.some(r => r.endsWith('canvas.md')));
  - type: javascript
    value: |
      const loaded = output.archivedWorkflows['data-model']?.stage_loaded || {};
      return Object.values(loaded).some(s => s.rules?.some(r => r.endsWith('drupal-data-model.md')));
  - type: javascript
    value: |
      const loaded = output.archivedWorkflows['data-model']?.stage_loaded || {};
      return !Object.values(loaded).some(s => s.rules?.some(r => r.endsWith('layout-builder.md')));
  - type: javascript
    value: Object.keys(output.pendingWorkflows).length === 0

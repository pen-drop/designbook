fixtures:
  - vision

prompt: |
  You are working in the directory {{workspace}}.
  Run the /debo sections workflow. Do NOT ask any questions.
  The product is "PetMatch" — a pet adoption platform. Read the product overview at designbook/product/vision.md.
  Create between 3 and 5 sections that cover the key areas of the product.
  Execute the workflow now.

assert:
  - type: javascript
    value: >
      const sectionFiles = output.newFiles.filter(f =>
      f.match(/^designbook\/sections\/[^/]+\/spec\.section\.yml$/));
      return sectionFiles.length >= 3 && sectionFiles.length <= 5;
  - type: javascript
    value: output.archivedWorkflows['sections']?.status === 'completed'
  - type: javascript
    value: output.archivedWorkflows['sections']?.tasks?.every(t => t.status === 'done')
  - type: javascript
    value: >
      const sectionFiles = output.newFiles.filter(f =>
      f.match(/^designbook\/sections\/[^/]+\/spec\.section\.yml$/));
      return sectionFiles.every(f => {
        const data = output.fileContents[f];
        return data && data.id && data.title && data.description && data.status;
      });
  - type: javascript
    value: Object.keys(output.pendingWorkflows).length === 0

name: pet-card
status: ready
group: content
provider: petmatch

props:
  type: object
  properties:
    name:
      type: string
      title: Pet Name
    breed:
      type: string
      title: Breed
    age:
      type: string
      title: Age
    image_url:
      type: string
      title: Photo URL
    status:
      type: string
      title: Adoption Status
      enum:
        - available
        - pending
        - adopted

slots:
  cta:
    title: Call to Action

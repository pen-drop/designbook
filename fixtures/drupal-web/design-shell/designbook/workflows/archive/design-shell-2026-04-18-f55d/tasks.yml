              properties:
                sdcStorybook:
                  type: object
                  required:
                    - disableBasicStory
                  properties:
                    disableBasicStory:
                      type: boolean
                      const: true
                      description: >-
                        Always `true`. Suppresses Drupal's auto-generated basic
                        story so the explicit `.story.yml` files drive
                        Storybook.

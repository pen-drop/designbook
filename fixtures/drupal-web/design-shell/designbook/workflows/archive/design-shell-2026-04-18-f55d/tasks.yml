                      type: object
                      properties:
                        label:
                          type: string
                        url:
                          type: string
      images:
        type: array
        description: >-
          Static images and brand assets detected in the design reference
          (logos, icons, illustrations).
        items:
          type: object
          required:
            - url
            - role
          properties:
            url:
              type: string
              description: Source URL or path of the image.
            role:
              type: string
              description: Visual role of the image.
              enum:
                - logo
                - icon
                - hero
                - background
                - illustration
                - avatar
                - other
            alt:
              type: string
              description: Alt text or accessible label if present.
            location:
              type: string
              description: 'Where the image appears: header, footer, main, sidebar.'
            width:
              type: string
              description: Rendered width (px or CSS value).
            height:
              type: string
              description: Rendered height (px or CSS value).
            local_path:
              type: string
              description: >
                Path (relative to the Storybook `public/` or configured static
                dir) where the asset has been downloaded. Empty if the asset
                could not be downloaded or is decorative-only. Scenes and
                components MUST reference this path (e.g. `<img
                src="/logo.svg">`) instead of text placeholders when it is set.
              examples:
                - /logo.svg
                - /assets/partner-bmbf.svg
      components:
        type: array
        description: UI components identified in the design reference.
        items:
          type: object
          properties:
            name:
              type: string
              description: >-
                Component type as it would be named in the design system (e.g.
                button, card, navigation, hero, badge).
            count:
              type: number
              description: Number of distinct instances detected.
            location:
              type: array
              description: Regions where the component appears.
              items:
                type: string
            variants:
              type: array
              description: >-
                Visual variants observed (e.g. primary/secondary,
                filled/outline, horizontal/vertical).
              items:
                type: string
            props:
              type: object
              description: >-
                Key visual properties extracted from the observed instances
                (colors, sizes, labels, etc.).
      sections:
        type: array
        description: >
          Page-level content zones between header and footer (hero, features
          grid, CTA, testimonials, etc.). Provides layout context for story
          structure decisions.
        items:
          type: object
          properties:
            type:
              type: string
              description: >-
                Section type (e.g. hero, features, cta, testimonials, pricing,
                faq, gallery, contact).
            bg:
              type: string
              description: Background color or gradient.
            layout:
              type: string
              description: Layout pattern (e.g. full-width, two-column, grid-3, centered).
            content_summary:
              type: string
              description: One-sentence description of what this section contains.
            order:
              type: integer
              description: Top-to-bottom position of the section on the page (1-based).
      shadows:
        type: array
        description: >
          Elevation / box-shadow tokens detected in the design reference. Maps
          to CSS custom properties (e.g. --shadow-card, --shadow-modal).
        items:
          type: object
          properties:
            value:
              type: string
              description: Full CSS box-shadow value.
            usage:
              type: array
              description: >-
                Contexts where this shadow appears (e.g. card, modal, dropdown,
                button, header).
              items:
                type: string
            token:
              type: string
              description: Suggested CSS custom property name (e.g. --shadow-sm).
      forms:
        type: array
        description: >
          Form patterns detected in the design reference — input fields, labels,
          error states, etc. Extracted per distinct form or form section
          observed.
        items:
          type: object
          properties:
            context:
              type: string
              description: >-
                Where the form appears or its purpose (e.g. login, newsletter,
                contact, search).
            fields:
              type: array
              description: Detected input fields.
              items:
                type: object
                properties:
                  type:
                    type: string
                    description: >-
                      Input type (text, email, password, select, checkbox,
                      radio, textarea).
                  label_position:
                    type: string
                    description: Label placement (above, inline, placeholder-only).
                  style:
                    type: object
                    properties:
                      bg:
                        type: string
                      border:
                        type: string
                      border_radius:
                        type: string
                      padding:
                        type: string
                      font_size:
                        type: string
            error_color:
              type: string
              description: Color used for validation error messages.
            submit_button:
              type: string
              description: Description of the submit CTA style.
      breakpoints:
        type: array
        description: >
          Responsive breakpoints observed in the design reference (e.g. when
          multiple viewport widths are shown). Maps detected px values to
          design-token breakpoint identifiers.
        items:
          type: object
          properties:
            px:
              type: integer
              description: Viewport width in pixels at which the layout changes.
            token_id:
              type: string
              description: Suggested breakpoint token identifier (e.g. sm, md, lg, xl).
            description:
              type: string
              description: >-
                What changes at this breakpoint (e.g. nav collapses, grid
                switches to single column).
  Component:
    type: object
    required:
      - component
      - group
    properties:
      component:
        type: string
      slots:
        type: array
        items:
          type: string
        default: []
      group:
        type: string
      description:
        type: string
      design_hint:
        $ref: '#/DesignHint'
      variants:
        type: array
        default: []
        items:
          $ref: '#/Variant'
  DesignHint:
    type: object
    properties:
      landmark:
        type: string
      rows:
        type: array
        items:
          type: object
          properties:
            bg:
              type: string
            height:
              type: string
            layout:
              type: string
            gap:
              type: string
            padding:
              type: string
            content:
              type: string
      fonts:
        type: object
      interactive:
        type: array
        items:
          type: object
          properties:
            element:
              type: string
            bg:
              type: string
            color:
              type: string
            border_radius:
              type: string
            padding:
              type: string
            box_shadow:
              type: string
      tokens:
        type: object
  Variant:
    type: object
    required:
      - id
    properties:
      id:
        type: string
        description: >
          Variant identifier in kebab-case. Used as the story filename segment
          (`<component>.<id>.story.yml`) and as the key in `.component.yml`
          `variants:`.
        examples:
          - main
          - footer
          - vertical
          - horizontal
      title:
        type: string
        description: Human-readable variant label shown in Storybook.
      description:
        type: string
        description: >-
          One-sentence summary of the variant's distinguishing visual or
          behavioural trait.
  SdcComponent: &ref_21
    title: SDC Component Metadata
    description: >
      The `.component.yml` file declaring an SDC component's metadata, props,
      slots and variants to Drupal and the Storybook addon.


      NAMING — directory name equals file base name; always kebab-case
      (`button/button.component.yml`, `nav-main/nav-main.component.yml`).
      Components are visually descriptive, never domain-specific: `card` ✅,
      `article-card` ❌; `grid` ✅, `article-teaser-grid` ❌.


      YAML QUOTING — all string values use double quotes (`"`). Single quotes
      cause parser errors in the SDC Storybook addon.


      STORIES LIVE IN SEPARATE FILES — never declare stories inside
      `.component.yml`. Every component MUST set
      `thirdPartySettings.sdcStorybook.disableBasicStory: true` and ship at
      least one `<component>.default.story.yml` alongside it.


      VARIANTS — when two components share the same props and slots but differ
      only in layout or visual arrangement, implement them as variants of a
      single component. Each variant listed here needs a matching
      `<component>.<variant-id>.story.yml`. Never declare a `variant` prop under
      `props.properties` when `variants:` is populated — the `variants:` block
      is the canonical source.
    type: object
    required:
      - name
      - status
      - group
    properties:
      $schema:
        type: string
        const: >-
          https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
        description: Path to the SDC JSON Schema. Always this exact URL.
      name:
        type: string
        description: >-
          Human-readable display name shown in Storybook navigation. Title case,
          free-form.
        examples:
          - Button
          - Card
          - Navigation
      status:
        type: string
        enum:
          - stable
          - experimental
          - deprecated
        description: >-
          Lifecycle state. `stable` for production-ready; `experimental` for
          in-development; `deprecated` for scheduled removal.
      group:
        type: string
        enum:
          - Action
          - Data Display
          - Navigation
          - Layout
          - Shell
        description: >-
          Top-level category used for Storybook grouping. Must be one of the
          listed values.
      description:
        type: string
        description: >-
          One-sentence summary of the component's purpose and typical usage
          context.
      provider:
        type: string
        description: >
          Drupal SDC namespace (module/theme name) that owns the component. Maps
          to a Twig namespace in `.storybook/main.js`. Resolve the literal
          `COMPONENT_NAMESPACE` placeholder to the concrete provider from config
          at generation time — never leave the placeholder in the written file.
        examples:
          - test_integration_drupal
          - designbook_design
      props:
        type: object
        description: >
          JSON Schema object describing the component's typed props. Always
          `type: object` with `properties:` and optional `required:`. Type
          mapping — `string` → `type: string`, `boolean` → `type: boolean`,
          `number` → `type: number` or `type: integer`, `array` → `type: array`,
          `object` → `type: object`. Enums are declared with `enum:` on the
          prop. Never declare a `variant` prop when the top-level `variants:`
          block exists. Omit the entire `props:` section when there are no
          props.
        properties:
          type:
            type: string
            const: object
            description: >-
              Always literally `object` — props are declared as a JSON Schema
              object type.
          properties:
            type: object
            description: >-
              Map of prop-name to JSON Schema type definition. Each prop uses
              camelCase or snake_case per the component's convention.
          required:
            type: array
            description: >-
              Names of required props that MUST be passed for the component to
              render correctly. Omit when empty.
            items:
              type: string
      slots:
        type: object
        description: >
          Map of slot-name to slot metadata (`title`, `description`). Slots
          receive pre-rendered content from the caller. Slot names MUST be
          snake_case (`main_content` ✅, `mainContent` ❌). Omit the `slots:`
          section when the component has none.
        additionalProperties:
          type: object
          properties:
            title:
              type: string
              description: Human-readable slot label.
            description:
              type: string
              description: One-sentence summary of what content belongs in this slot.
      variants:
        type: object
        description: >
          Map of variant-id (kebab-case) to variant metadata. Each variant must
          have a matching `<component>.<variant-id>.story.yml`. Omit the
          `variants:` section when the component has none.
        additionalProperties:
          type: object
          properties:
            title:
              type: string
              description: Human-readable variant label shown in Storybook.
            description:
              type: string
              description: >-
                One-sentence summary of the variant's distinguishing visual or
                behavioural trait.
      thirdPartySettings:
        type: object
        description: >
          Vendor-specific settings. The `sdcStorybook.disableBasicStory: true`
          entry is MANDATORY for every component — it suppresses the
          auto-generated basic story so the explicit `.story.yml` files are used
          instead.
        required:
          - sdcStorybook
        properties:
          sdcStorybook:
            type: object
            required:
              - disableBasicStory
            properties:
              disableBasicStory:
                type: boolean
                const: true
                description: >-
                  Always `true`. Suppresses Drupal's auto-generated basic story
                  so the explicit `.story.yml` files drive Storybook.
  SdcStory: &ref_27
    title: SDC Story File
    description: >
      A `<component>.<story-name>.story.yml` file describing one visually
      distinct rendering of a component.


      FLAT FORMAT — top-level keys are `component`, `name`, `variant`, `props`,
      `slots`. There is no `stories:` wrapper.


      ONE STORY PER FILE — never combine multiple stories via `---` YAML
      document separators. Each meaningful story gets its own file.


      FILENAME PATTERN — `[component-name].[story-name].story.yml` with a
      mandatory name segment. Use `default` as the story name for the
      primary/single story (`footer.default.story.yml`). Variant stories use the
      variant id as the name segment (`card.vertical.story.yml`,
      `card.horizontal.story.yml`).


      YAML QUOTING — always double quotes.


      VISUAL DISTINCTNESS — every story should demonstrate a visually distinct
      state. Good candidates: one file per layout variant, content-length
      extremes, state variations (empty slots, missing optional props),
      context/page scenarios. Avoid stories that look identical but differ only
      in invisible props.
    type: object
    required:
      - component
    properties:
      component:
        type: string
        description: >
          Fully qualified component reference in `<provider>:<component-name>`
          format. The `<provider>` prefix is mandatory. Look up the concrete
          provider from the target component's own `.component.yml` →
          `provider:` field. The provider maps to a Twig namespace configured in
          `.storybook/main.js` → `sdcStorybookOptions.namespaces`; without it
          the SDC addon cannot resolve the component path.
        examples:
          - test_integration_drupal:header
          - designbook_design:entity-article
      name:
        type: string
        description: Story name shown in Storybook. Use `Default` for the primary story.
      variant:
        type: string
        description: >-
          Variant id (kebab-case) when the story exercises a specific variant
          declared in `.component.yml`. Omit for the default variant.
      props:
        type: object
        description: >-
          Prop overrides for this story. Keys match prop names declared in the
          component's `.component.yml`. When the component has a `variants:`
          block, set `variant:` at the top level instead of via a `variant`
          prop.
      slots:
        type: object
        description: >
          Slot content for this story. Each key is a slot name (snake_case,
          matching `.component.yml`); each value is an array of `SdcStoryNode`
          objects.
        additionalProperties:
          type: array
          items:
            $ref: '#/SdcStoryNode'
  SdcStoryNode:
    title: SDC Story Node
    description: >
      A single content item in a story slot. The `type` field (required) selects
      one of three shapes below.


      IMAGE URLS — images in story files MUST use placeholder service URLs (e.g.
      `https://placehold.co/600x400`). Local file paths do not exist in
      Storybook and will not render.
    type: object
    required:
      - type
    properties:
      type:
        type: string
        enum:
          - element
          - component
          - image
        description: >
          Discriminator — picks which shape applies (see `oneOf` below):

          - `element` → renders inline HTML. Requires `value`. Optional: `tag`,
          `attributes`.

          - `component` → nests another SDC component. Requires `component`
          (fully qualified `<provider>:<name>`). Optional: `props`, `slots`.

          - `image` → embeds a placeholder image. Requires `uri` (external URL).
          Optional: `attributes`.
    oneOf:
      - title: Element Node
        description: >
          Renders inline HTML. MUST use `value:` for text — the key `content:`
          is NOT supported and causes `undefined` to render.
        required:
          - type
          - value
        properties:
          type:
            type: string
            const: element
          value:
            type: string
            description: Text or HTML to render. Use `value:` — never `content:`.
            examples:
              - Hello World
              - <strong>Bold text</strong>
          tag:
            type: string
            description: HTML wrapper tag. Defaults to `div` when omitted.
            examples:
              - p
              - h2
              - div
              - span
              - button
          attributes:
            type: object
            description: HTML attributes applied to the wrapper tag (e.g. `class`, `id`).
      - title: Component Node
        description: Nests another SDC component inside a slot.
        required:
          - type
          - component
        properties:
          type:
            type: string
            const: component
          component:
            type: string
            description: >-
              Fully qualified component reference in
              `<provider>:<component-name>` format.
            examples:
              - test_integration_drupal:navigation
              - designbook_design:card
          props:
            type: object
            description: Prop overrides for the nested component.
          slots:
            type: object
            description: >-
              Slot content overrides for the nested component (same
              `SdcStoryNode` array format).
      - title: Image Node
        description: Embeds an image into a slot.
        required:
          - type
          - uri
        properties:
          type:
            type: string
            const: image
          uri:
            type: string
            description: >-
              Placeholder image URL — MUST be an external placeholder service.
              Never a local path.
            examples:
              - https://placehold.co/600x400
              - https://placehold.co/1200x630/png
          attributes:
            type: object
            description: HTML attributes for the image element (e.g. `class`, `alt`).
  SceneFile: &ref_32
    type: object
    required:
      - scenes
    properties:
      id:
        type: string
        description: Section/shell identifier for Designbook overview pages.
      title:
        type: string
        description: Human-readable title for overview page.
      description:
        type: string
        description: Section description for overview page.
      status:
        type: string
        enum:
          - planned
          - in-progress
          - done
      order:
        type: integer
        description: Display order in Storybook sidebar.
      group:
        type: string
        description: >-
          Storybook story group (e.g. "Designbook/Design System"). Falls back to
          name.
      scenes:
        type: array
        items:
          $ref: '#/SceneDef'
  SceneDef:
    type: object
    required:
      - name
      - items
    properties:
      name:
        type: string
        description: Display name in Storybook sidebar.
      docs:
        type: string
      section:
        type: string
        description: Section ID for data loading.
      group:
        type: string
      theme:
        type: string
      items:
        type: array
        items:
          $ref: '#/SceneNode'
  SceneNode:
    description: >
      Duck-typed by its identifying key. Exactly one of: component
      (ComponentNode), entity (EntityNode), scene (SceneRefNode), image
      (ImageNode).
    oneOf:
      - $ref: '#/ComponentNode'
      - $ref: '#/EntityNode'
      - $ref: '#/SceneRefNode'
      - $ref: '#/ImageNode'
  ComponentNode:
    type: object
    required:
      - component
    description: Render a UI component directly.
    properties:
      component:
        type: string
        description: provider:component-name format (e.g. $COMPONENT_NAMESPACE:card)
      props:
        type: object
        description: Data/configuration values passed to the component.
      slots:
        type: object
        description: >
          Named content slots. Values can be: string, SceneNode, or array of
          SceneNode.
        additionalProperties:
          oneOf:
            - type: string
            - $ref: '#/SceneNode'
            - type: array
              items:
                oneOf:
                  - type: string
                  - $ref: '#/SceneNode'
      story:
        type: string
        description: Load args from an existing story variant.
  EntityNode:
    type: object
    required:
      - entity
    description: >
      Render an entity from sample data via JSONata mapping. Entity format:
      "entity_type.bundle" or "[listing_type].[bundle]" for listings.
    properties:
      entity:
        type: string
        description: entity_type.bundle (e.g. node.article)
      view_mode:
        type: string
        description: Which view mode to use for entity mapping.
      record:
        type: integer
        default: 0
        description: Sample data record index.
      records:
        type: array
        items:
          type: integer
        description: >
          Demo-only shorthand. Expands to separate entries per index. Do NOT use
          for listing pages — use view.* entities instead.
  SceneRefNode:
    type: object
    required:
      - scene
    description: Embed another scene and fill its $variable placeholders.
    properties:
      scene:
        type: string
        description: source:sceneName format (e.g. design-system:shell)
      with:
        type: object
        description: >
          Fills $variable placeholders in the referenced scene. Keys are
          variable names (without $), values are SceneNode arrays or strings.
        additionalProperties:
          oneOf:
            - type: string
            - type: array
              items:
                $ref: '#/SceneNode'
  ImageNode:
    type: object
    required:
      - image
    description: >
      Render an image using a named image style from config.image_style in
      data-model.yml. Resolved by imageStyleBuilder into a designbook:image
      ComponentNode.
    properties:
      image:
        type: string
        description: >-
          Name of an image style bundle defined under config.image_style in
          data-model.yml (e.g. hero, "16_9", "4_3").
      alt:
        type: string
        description: Alt text for the image.
      src:
        type: string
        description: >
          Optional custom image path. When omitted, the configured image
          provider generates a placeholder URL. When provided, CSS aspect-ratio
          is applied instead.

title: Design Shell
workflow: design-shell
workflow_id: f55d
status: completed
engine: direct
params:
  reference_url: https://leando.de/
  regions: header,footer
  scene_id: design-system:shell
  section_id: shell
  section_title: Shell
  reference_folder: >-
    /home/cw/projects/designbook/workspaces/drupal-web/designbook/references/174cdaac3562
  story_url: >-
    http://localhost:44697/iframe.html?id=designbook-design-system-scenes--shell&viewMode=story
stages:
  reference:
    steps:
      - extract-reference
  intake:
    steps:
      - intake
  component:
    steps:
      - create-component
  scene:
    steps:
      - create-scene
  validate:
    steps:
      - validate
stage_loaded:
  extract-reference:
    task_file: .claude/skills/designbook/design/tasks/extract-reference.md
    rules: []
    blueprints: []
    config_rules: []
    config_instructions: []
    schema:
      definitions:
        StoryId:
          type: string
          description: >
            Storybook story ID in `Group/Component--variant` format
            (CSF-compliant). Used to render or verify a specific story variant.
          examples:
            - Designbook/Sections/Hero--default
            - Components/Card--primary
        ReferenceFolder:
          type: string
          description: >
            Path to a scene's verification material — contains `extract.json`
            (reference structure) and reference screenshots per
            breakpoint/region. Format: `{breakpoint}--{region}.png` (e.g.
            `xl--full.png`).
          examples:
            - $DESIGNBOOK_DATA/references/hero
            - /tmp/refs/article
        Vision:
          type: object
          required:
            - product_name
            - description
          properties:
            product_name:
              type: string
              title: Product Name
            description:
              type: string
              title: Description
            problems:
              type: array
              title: Problems & Solutions
              default: []
              items:
                type: object
                properties:
                  title:
                    type: string
                  solution:
                    type: string
            features:
              type: array
              title: Key Features
              default: []
              items:
                type: string
            design_reference:
              type: object
              title: Design Reference
              default: null
              properties:
                type:
                  type: string
                url:
                  type: string
                label:
                  type: string
            references:
              type: array
              title: References
              default: []
              items:
                type: object
                properties:
                  type:
                    type: string
                  url:
                    type: string
                  label:
                    type: string
        DesignReference:
          type: object
          required:
            - source
            - extracted
            - strategy
          properties:
            source:
              type: string
            extracted:
              type: string
            strategy:
              type: string
              enum:
                - vision
                - playwright+vision
            assets_dir:
              type: string
              description: >
                Directory (relative to the reference folder) where downloaded
                static assets (logos, icons, SVGs) are stored. Typically
                `assets/`.
              examples:
                - assets
            fonts:
              type: array
              items:
                type: object
                properties:
                  family:
                    type: string
                  source:
                    type: string
                  weights:
                    type: array
                    items:
                      type: number
                  styles:
                    type: array
                    items:
                      type: string
            typography:
              type: array
              items:
                type: object
                properties:
                  element:
                    type: string
                  font_family:
                    type: string
                  font_size:
                    type: string
                  line_height:
                    type: string
                  letter_spacing:
                    type: string
                  font_weight:
                    type: number
                  color:
                    type: string
            colors:
              type: array
              items:
                type: object
                properties:
                  hex:
                    type: string
                  usage:
                    type: array
                    items:
                      type: string
            css_variables:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  value:
                    type: string
            spacing:
              type: object
              properties:
                container_max_width:
                  type: string
                edge_padding:
                  type: string
                section_gap:
                  type: string
                values:
                  type: array
                  items:
                    type: string
            landmarks:
              type: object
              properties:
                header:
                  type: object
                  properties:
                    rows:
                      type: array
                      items:
                        type: object
                        properties:
                          tag:
                            type: string
                          bg:
                            type: string
                          height:
                            type: string
                          padding:
                            type: string
                          content:
                            type: string
                          layout:
                            type: string
                          gap:
                            type: string
                footer:
                  type: object
                  properties:
                    rows:
                      type: array
                      items:
                        type: object
                        properties:
                          tag:
                            type: string
                          bg:
                            type: string
                          height:
                            type: string
                          padding:
                            type: string
                          content:
                            type: string
                          layout:
                            type: string
                          gap:
                            type: string
            interactive:
              type: array
              items:
                type: object
                properties:
                  element:
                    type: string
                  selector:
                    type: string
                  bg:
                    type: string
                  color:
                    type: string
                  border_radius:
                    type: string
                  padding:
                    type: string
                  font:
                    type: string
                  box_shadow:
                    type: string
                  border:
                    type: string
            tokens:
              type: object
              properties:
                colors:
                  type: object
                fonts:
                  type: object
                spacing:
                  type: array
                  items:
                    type: string
                radii:
                  type: array
                  items:
                    type: string
            navigation:
              type: array
              description: Navigation structures detected in the design reference.
              items:
                type: object
                properties:
                  role:
                    type: string
                    description: >-
                      Navigation context: main, footer, breadcrumb, sidebar,
                      utility.
                    enum:
                      - main
                      - footer
                      - breadcrumb
                      - sidebar
                      - utility
                  items:
                    type: array
                    description: Ordered list of navigation entries.
                    items:
                      type: object
                      properties:
                        label:
                          type: string
                        url:
                          type: string
                        active:
                          type: boolean
                          description: >-
                            True if this item appears as the active/current
                            page.
                        children:
                          type: array
                          description: Sub-navigation items (one level deep).
                          items:
                            type: object
                            properties:
                              label:
                                type: string
                              url:
                                type: string
            images:
              type: array
              description: >-
                Static images and brand assets detected in the design reference
                (logos, icons, illustrations).
              items:
                type: object
                required:
                  - url
                  - role
                properties:
                  url:
                    type: string
                    description: Source URL or path of the image.
                  role:
                    type: string
                    description: Visual role of the image.
                    enum:
                      - logo
                      - icon
                      - hero
                      - background
                      - illustration
                      - avatar
                      - other
                  alt:
                    type: string
                    description: Alt text or accessible label if present.
                  location:
                    type: string
                    description: 'Where the image appears: header, footer, main, sidebar.'
                  width:
                    type: string
                    description: Rendered width (px or CSS value).
                  height:
                    type: string
                    description: Rendered height (px or CSS value).
                  local_path:
                    type: string
                    description: >
                      Path (relative to the Storybook `public/` or configured
                      static dir) where the asset has been downloaded. Empty if
                      the asset could not be downloaded or is decorative-only.
                      Scenes and components MUST reference this path (e.g. `<img
                      src="/logo.svg">`) instead of text placeholders when it is
                      set.
                    examples:
                      - /logo.svg
                      - /assets/partner-bmbf.svg
            components:
              type: array
              description: UI components identified in the design reference.
              items:
                type: object
                properties:
                  name:
                    type: string
                    description: >-
                      Component type as it would be named in the design system
                      (e.g. button, card, navigation, hero, badge).
                  count:
                    type: number
                    description: Number of distinct instances detected.
                  location:
                    type: array
                    description: Regions where the component appears.
                    items:
                      type: string
                  variants:
                    type: array
                    description: >-
                      Visual variants observed (e.g. primary/secondary,
                      filled/outline, horizontal/vertical).
                    items:
                      type: string
                  props:
                    type: object
                    description: >-
                      Key visual properties extracted from the observed
                      instances (colors, sizes, labels, etc.).
            sections:
              type: array
              description: >
                Page-level content zones between header and footer (hero,
                features grid, CTA, testimonials, etc.). Provides layout context
                for story structure decisions.
              items:
                type: object
                properties:
                  type:
                    type: string
                    description: >-
                      Section type (e.g. hero, features, cta, testimonials,
                      pricing, faq, gallery, contact).
                  bg:
                    type: string
                    description: Background color or gradient.
                  layout:
                    type: string
                    description: >-
                      Layout pattern (e.g. full-width, two-column, grid-3,
                      centered).
                  content_summary:
                    type: string
                    description: One-sentence description of what this section contains.
                  order:
                    type: integer
                    description: >-
                      Top-to-bottom position of the section on the page
                      (1-based).
            shadows:
              type: array
              description: >
                Elevation / box-shadow tokens detected in the design reference.
                Maps to CSS custom properties (e.g. --shadow-card,
                --shadow-modal).
              items:
                type: object
                properties:
                  value:
                    type: string
                    description: Full CSS box-shadow value.
                  usage:
                    type: array
                    description: >-
                      Contexts where this shadow appears (e.g. card, modal,
                      dropdown, button, header).
                    items:
                      type: string
                  token:
                    type: string
                    description: Suggested CSS custom property name (e.g. --shadow-sm).
            forms:
              type: array
              description: >
                Form patterns detected in the design reference — input fields,
                labels, error states, etc. Extracted per distinct form or form
                section observed.
              items:
                type: object
                properties:
                  context:
                    type: string
                    description: >-
                      Where the form appears or its purpose (e.g. login,
                      newsletter, contact, search).
                  fields:
                    type: array
                    description: Detected input fields.
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          description: >-
                            Input type (text, email, password, select, checkbox,
                            radio, textarea).
                        label_position:
                          type: string
                          description: Label placement (above, inline, placeholder-only).
                        style:
                          type: object
                          properties:
                            bg:
                              type: string
                            border:
                              type: string
                            border_radius:
                              type: string
                            padding:
                              type: string
                            font_size:
                              type: string
                  error_color:
                    type: string
                    description: Color used for validation error messages.
                  submit_button:
                    type: string
                    description: Description of the submit CTA style.
            breakpoints:
              type: array
              description: >
                Responsive breakpoints observed in the design reference (e.g.
                when multiple viewport widths are shown). Maps detected px
                values to design-token breakpoint identifiers.
              items:
                type: object
                properties:
                  px:
                    type: integer
                    description: Viewport width in pixels at which the layout changes.
                  token_id:
                    type: string
                    description: >-
                      Suggested breakpoint token identifier (e.g. sm, md, lg,
                      xl).
                  description:
                    type: string
                    description: >-
                      What changes at this breakpoint (e.g. nav collapses, grid
                      switches to single column).
      params:
        story_id:
          default: ''
          $ref: '#/definitions/StoryId'
        reference_folder:
          default: ''
          resolve: reference_folder
          from: vision.design_reference.url
          $ref: '#/definitions/ReferenceFolder'
        vision:
          type: object
          path: >-
            /home/cw/projects/designbook/workspaces/drupal-web/designbook/vision.yml
          exists: true
          content:
            product_name: LEANDO
            description: >-
              The portal for vocational training practice — a platform by BIBB
              (Federal Institute for Vocational Education and Training) for
              trainers, examiners, and vocational education professionals.
            problems:
              - title: >-
                  Training personnel cannot find relevant materials and
                  information in one place
                solution: >-
                  Curated portal with topic, profession, and target group
                  navigation
              - title: >-
                  Networking and exchange among vocational training
                  practitioners is lacking
                solution: Community features with events, groups, and discussions
              - title: Learning materials are scattered and not interactive
                solution: Structured learning packages with SCORM and H5P integration
            features:
              - Topic and profession-based content navigation
              - Event management with registration and BBB video conferencing
              - Learning packages (Learning Nuggets) with interactive content
              - Handbook system (Book) for structured documentation
              - Landing pages with flexible paragraph-based sections
              - Location and profession database
            design_reference:
              type: url
              url: https://leando.de/
              label: LEANDO production portal
            references:
              - type: source
                url: ~/projects/leando/frontend
                label: Angular frontend
              - type: source
                url: ~/projects/leando/leando-community/drupal
                label: Drupal backend
          $ref: '#/definitions/Vision'
      result:
        reference_dir:
          $ref: '#/definitions/ReferenceFolder'
        reference:
          type: object
          path: '{{ reference_folder }}/extract.json'
          $ref: '#/definitions/DesignReference'
        screenshot:
          type: string
          default: ''

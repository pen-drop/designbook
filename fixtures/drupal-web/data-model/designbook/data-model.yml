config:
  image_style:
    ratio_16_9:
      aspect_ratio: '16:9'
    ratio_4_3:
      aspect_ratio: '4:3'
    ratio_1_1:
      aspect_ratio: '1:1'
content:
  node:
    landing_page:
      title: Landing Page
      description: Flexible landing pages with paragraph-based sections
      view_modes:
        full:
          template: field-map
        teaser:
          template: field-map
      fields:
        field_short_title:
          type: string
          title: Kurztitel
        field_banner_headline:
          type: string
          title: Banner Überschrift
        field_banner_text:
          type: text
          title: Banner Text
        field_banner_image:
          type: reference
          title: Banner Bild
          settings:
            target_type: media
            target_bundle: image
        field_banner_link:
          type: link
          title: Banner Link
        field_banner_enabled:
          type: boolean
          title: Banner aktiv
        field_landing_page_image:
          type: image
          title: Seitenbild
        field_landing_page_section:
          type: reference
          title: Sektionen
          multiple: true
          settings:
            target_type: paragraph
            target_bundle:
              - banner_typ2
              - content_teaser
        field_landing_page_type:
          type: reference
          title: Seitentyp
          required: true
          settings:
            target_type: taxonomy_term
            target_bundle: landing_page_types
        field_topics:
          type: reference
          title: Themen
          multiple: true
          settings:
            target_type: taxonomy_term
            target_bundle: topics
        field_professions:
          type: reference
          title: Berufe
          multiple: true
          settings:
            target_type: taxonomy_term
            target_bundle: professions
        field_target_groups:
          type: reference
          title: Zielgruppen
          multiple: true
          settings:
            target_type: taxonomy_term
            target_bundle: target_groups
        field_hashtags:
          type: reference
          title: Hashtags
          multiple: true
          settings:
            target_type: taxonomy_term
            target_bundle: hashtags
        field_areas_of_responsility:
          type: reference
          title: Zuständigkeitsbereiche
          multiple: true
          settings:
            target_type: taxonomy_term
            target_bundle: areas_of_responsibility
    event:
      title: Veranstaltung
      description: Events with registration, scheduling, and video conferencing integration
      view_modes:
        full:
          template: field-map
        teaser:
          template: field-map
        card:
          template: field-map
      fields:
        body:
          type: formatted_text
          title: Beschreibung
          required: true
        field_event_date:
          type: datetime
          title: Startdatum
          required: true
        field_event_date_end:
          type: datetime
          title: Enddatum
        field_event_all_day:
          type: boolean
          title: Ganztägig
        field_event_location:
          type: string
          title: Veranstaltungsort
        field_event_address:
          type: address
          title: Adresse
        field_event_image:
          type: image
          title: Veranstaltungsbild
        field_event_image_media:
          type: reference
          title: Veranstaltungsbild (Media)
          settings:
            target_type: media
            target_bundle: image
        field_event_enroll:
          type: boolean
          title: Anmeldung aktivieren
        field_event_max_enroll:
          type: boolean
          title: Teilnehmerlimit aktivieren
        field_event_max_enroll_num:
          type: integer
          title: Maximale Teilnehmeranzahl
        field_event_managers:
          type: reference
          title: Veranstaltungsleitung
          multiple: true
          settings:
            target_type: user
        field_event_type:
          type: reference
          title: Veranstaltungstyp
          settings:
            target_type: taxonomy_term
            target_bundle: event_types
        field_files:
          type: file
          title: Dateien
          multiple: true
        field_files_media:
          type: reference
          title: Dateien (Media)
          multiple: true
          settings:
            target_type: media
            target_bundle: document
        field_topics:
          type: reference
          title: Themen
          multiple: true
          settings:
            target_type: taxonomy_term
            target_bundle: topics
        field_professions:
          type: reference
          title: Berufe
          multiple: true
          settings:
            target_type: taxonomy_term
            target_bundle: professions
        field_target_groups:
          type: reference
          title: Zielgruppen
          multiple: true
          settings:
            target_type: taxonomy_term
            target_bundle: target_groups
        field_hashtags:
          type: reference
          title: Hashtags
          multiple: true
          settings:
            target_type: taxonomy_term
            target_bundle: hashtags
        field_areas_of_responsility:

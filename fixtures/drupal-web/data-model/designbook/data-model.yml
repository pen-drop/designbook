config:
  image_style:
    ratio_16_9:
      aspect_ratio: '16:9'
    ratio_4_3:
      aspect_ratio: '4:3'
    ratio_1_1:
      aspect_ratio: '1:1'
  views.view.landing_teasers:
    label: Landing teasers
    purpose: >
      A view that lists node.landing_page entities rendered in the teaser
      view-mode, embedded on the article page. This is the view-mapping path
      the sync eval exercises.
    base_table: node_field_data
    row:
      entity_type: node
      bundle: landing_page
      view_mode: teaser
    filters:
      type: landing_page
      status: 1
    sort:
      created: DESC
content:
  node:
    landing_page:
      title: Landing Page
      description: A landing page; surfaced as a teaser in the article listing view.
      fields:
        field_short_title:
          type: string
          title: Short title
        field_landing_page_image:
          type: entity_reference
          title: Teaser image
          settings:
            target_type: media
            handler: 'default:media'
            target_bundles: [image]
        field_landing_page_type:
          type: entity_reference
          title: Type
          settings:
            target_type: taxonomy_term
            handler: 'default:taxonomy_term'
            target_bundles: [landing_page_types]
      view_modes:
        teaser:
          template: field-map
        card:
          template: field-map
          label: Card
    article:
      title: Article
      description: An editorial page that embeds the landing-page teaser listing view.
      fields:
        field_body:
          type: text_long
          title: Body
      view_modes:
        full:
          template: field-map
  taxonomy_term:
    landing_page_types:
      title: Seitentypen
      description: Landing page type classification
  media:
    image:
      title: Bild
      description: Image media
      view_modes:
        ratio_16_9:
          template: field-map
        ratio_4_3:
          template: field-map
        ratio_1_1:
          template: field-map
  paragraph:
    signage:
      title: Wegweiser
      description: Signpost / topic-navigation paragraph holding up to three navigation items
      fields:
        field_paragraph_style:
          type: string
          title: Stil
        field_overlapping_top:
          type: boolean
          title: Überlappend
        field_signage_item:
          type: reference
          title: Wegweiser Element
          multiple: true
          settings:
            target_type: paragraph
            target_bundle: signage_item
    signage_item:
      title: Wegweiser Element
      description: One navigation item within a Wegweiser — icon, title, description, links, and CTA buttons
      fields:
        field_title:
          type: string
          title: Titel
        field_description:
          type: text
          title: Beschreibung
        field_icon:
          type: string
          title: Icon
        field_links:
          type: link
          title: Links
          multiple: true
        field_button_anonymous:
          type: link
          title: Button anonym
        field_button_authenticated:
          type: link
          title: Button angemeldet

fixtures:
  - vision
  - data-model
  - tokens
  - css-generate
  - sections
  - design-shell
  - design-verify-shell

prompt: |
  You are working in the directory {{workspace}}.
  Run the /debo design-screen workflow. Do NOT ask any questions.
  Design the homepage section.
  Use the design reference from vision.md.
  The homepage on https://leando.de/ is the primary reference.
  Execute the workflow now.

assert:
  - type: javascript
    value: output.archivedWorkflows['design-screen']?.status === 'completed'
  - type: javascript
    value: output.archivedWorkflows['design-screen']?.tasks?.every(t => t.status === 'done')
  - type: javascript
    value: Object.keys(output.pendingWorkflows).length === 0

fixtures:
  - vision
  - data-model
  - tokens
  - css-generate

prompt: |
  You are working in the directory {{workspace}}.
  Run the /debo design-shell workflow. Do NOT ask any questions.
  Use reference_url: https://leando.de/ as the primary design reference for the shell.
  The regions are: header, footer.
  Use breakpoints sm and xl.
  Execute the workflow now.

assert:
  - type: javascript
    value: output.archivedWorkflows['design-shell']?.status === 'completed'
  - type: javascript
    value: output.archivedWorkflows['design-shell']?.tasks?.every(t => t.status === 'done')
  - type: javascript
    value: Object.keys(output.pendingWorkflows).length === 0

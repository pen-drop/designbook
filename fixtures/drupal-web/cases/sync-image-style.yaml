fixtures:
  - vision
  - data-model
  - design-entity

prompt: |
  You are working in the directory {{workspace}}.
  Run the /debo sync-to workflow in eval mode (gate: soft) to export all image
  styles to Drupal config.
  Filter the export to config_key prefix image.style. Author the per-config-name
  JSONata against the prepare-fetched schema, write each config YAML, validate,
  and run drush config:import. Do NOT ask any questions; if a decision cannot be
  made from the data model + fixtures, fail the run.

assert:
  - type: javascript
    value: output.archivedWorkflows['sync-to']?.status === 'completed'

expected_config:
  - image.style.ratio_16_9
  - image.style.ratio_4_3
  - image.style.ratio_1_1

metric: |
  (
    $vpr := validate_pass_rate;
    $er := existence_rate;
    $base := 0.6 * $vpr + 0.4 * $er;
    cim_ok ? $base * 100 : $base * 50
  )
direction: max

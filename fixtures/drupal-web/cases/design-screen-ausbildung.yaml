fixtures:
  - vision
  - data-model
  - tokens
  - css-generate
  - sections
  - design-shell
  - design-verify-shell
  - design-screen-homepage
  - design-verify-screen-homepage

prompt: |
  You are working in the directory {{workspace}}.
  Run the /debo design-screen workflow. Do NOT ask any questions.
  Design the ausbildung section (structured article/topic pages).
  Use the design reference from vision.md.
  The article page https://leando.de/ausbildung/einen-betrieblichen-ausbildungsplan-erstellen is the primary reference for the article layout.
  Execute the workflow now.

assert:
  - type: javascript
    value: output.archivedWorkflows['design-screen']?.status === 'completed'
  - type: javascript
    value: output.archivedWorkflows['design-screen']?.tasks?.every(t => t.status === 'done')
  - type: javascript
    value: Object.keys(output.pendingWorkflows).length === 0

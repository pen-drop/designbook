slots:
  brand:
    - type: "element"
      tag: "div"
      attributes:
        class: "flex items-center gap-2"
      value: "<span class=\"material-symbols-outlined text-on-surface\">terminal</span><span class=\"font-bold text-on-surface text-xl font-heading\">Designbook</span>"
  navigation:
    - type: "component"
      component: "test_integration_drupal:navigation"
      args:
        variant: "footer"
        groups:
          - title: "Resources"
            items:
              - title: "Changelog"
                url: "/changelog"
              - title: "GitHub"
                url: "/github"
          - title: "Legal"
            items:
              - title: "Status"
                url: "/status"
              - title: "Privacy"
                url: "/privacy"

title: "Header"
component: "test_integration_drupal:header"
args:
  sticky: true
slots:
  logo:
    - type: "element"
      tag: "a"
      attributes:
        href: "/"
        class: "flex items-center gap-2 text-on-surface"
      value: "<span class=\"material-symbols-outlined\">terminal</span><span class=\"text-xl font-bold tracking-tight font-heading\">Designbook</span>"
  navigation:
    - type: "component"
      component: "test_integration_drupal:navigation"
      args:
        variant: "main"
        items:
          - title: "Guide"
            url: "/guide"
            in_active_trail: false
            below: []
          - title: "Examples"
            url: "/examples"
            in_active_trail: false
            below: []
          - title: "Community"
            url: "/community"
            in_active_trail: false
            below: []
  actions:
    - type: "element"
      tag: "div"
      attributes:
        class: "flex items-center gap-4"
      value: "<button class=\"material-symbols-outlined p-2 text-on-surface-variant hover:text-on-surface transition-colors\">search</button><a href=\"/get-started\" class=\"bg-white text-black px-4 py-1.5 rounded font-semibold text-sm hover:bg-white/90 transition-all\">Get Started</a>"

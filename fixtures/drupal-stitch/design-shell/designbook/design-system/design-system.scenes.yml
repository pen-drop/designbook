id: "debo-design-system"
title: "Design System"
description: "Designbook application shell — Vercel-style dark landing page with header, content area, and footer."
status: "planned"
order: 0

group: "Designbook/Design System"
scenes:
  - name: "shell"
    items:
      - component: "test_integration_drupal:page"
        slots:
          header:
            - component: "test_integration_drupal:header"
              props:
                sticky: true
              slots:
                logo: "<a href=\"/\" class=\"flex items-center gap-2 text-on-surface\"><span class=\"material-symbols-outlined\">terminal</span><span class=\"text-xl font-bold tracking-tight font-heading\">Designbook</span></a>"
                navigation:
                  - component: "test_integration_drupal:navigation"
                    props:
                      variant: "main"
                      items:
                        - title: "Guide"
                          url: "/guide"
                          in_active_trail: false
                          below: []
                        - title: "Examples"
                          url: "/examples"
                          in_active_trail: false
                          below: []
                        - title: "Community"
                          url: "/community"
                          in_active_trail: false
                          below: []
                actions: "<button class=\"material-symbols-outlined p-2 text-on-surface-variant hover:text-on-surface transition-colors\">search</button><a href=\"/get-started\" class=\"bg-white text-black px-4 py-1.5 rounded font-semibold text-sm hover:bg-white/90 transition-all\">Get Started</a>"
          content: "$content"
          footer:
            - component: "test_integration_drupal:footer"
              props:
                copyright: "&copy; 2024 Designbook. High-performance spec-driven design tools for the modern web."
              slots:
                brand: "<span class=\"material-symbols-outlined text-on-surface\">terminal</span><span class=\"font-bold text-on-surface text-xl font-heading\">Designbook</span>"
                navigation:
                  - component: "test_integration_drupal:navigation"
                    props:
                      variant: "footer"
                      groups:
                        - title: "Resources"
                          items:
                            - title: "Changelog"
                              url: "/changelog"
                            - title: "GitHub"
                              url: "/github"
                        - title: "Legal"
                          items:
                            - title: "Status"
                              url: "/status"
                            - title: "Privacy"
                              url: "/privacy"

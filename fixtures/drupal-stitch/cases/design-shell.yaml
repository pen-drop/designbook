fixtures:
  - vision
  - data-model
  - design-guideline
  - tokens
  - css-generate

prompt: |
  You are working in the directory {{workspace}}.
  Run the /debo design-shell workflow. Do NOT ask any questions.
  Use the design reference from guidelines.yml.
  The landing page screen on Stitch is the primary reference for the shell design:
  projects/5626339350367683412/screens/c0b358251f844f5da0313176267819de
  Execute the workflow now.

assert:
  - type: javascript
    value: output.archivedWorkflows['design-shell']?.status === 'completed'
  - type: javascript
    value: output.archivedWorkflows['design-shell']?.tasks?.every(t => t.status === 'done')
  - type: javascript
    value: Object.keys(output.pendingWorkflows).length === 0

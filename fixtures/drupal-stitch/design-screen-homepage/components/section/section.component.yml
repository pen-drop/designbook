$schema: "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: "section"
status: "experimental"
group: "Layout"
description: "Layout Builder adapter. Combines container (max-width, padding, background) with grid (responsive columns) and provides 8 fixed column slots."
props:
  type: "object"
  properties:
    max_width:
      title: "Max Width"
      type: "string"
      enum: ["sm", "md", "lg", "xl", "full"]
      description: "Container max-width. Passed to container component."
    padding_top:
      title: "Padding Top"
      type: "string"
      enum: ["auto", "none", "sm", "md", "lg"]
      default: "auto"
      description: "Top section padding. Passed to container component."
    padding_bottom:
      title: "Padding Bottom"
      type: "string"
      enum: ["auto", "none", "sm", "md", "lg"]
      default: "auto"
      description: "Bottom section padding. Passed to container component."
    display_header:
      title: "Display Header"
      type: "boolean"
      default: true
      description: "Whether to display the header. Passed to container component."
    theme:
      title: "Theme"
      type: "string"
      description: "Visual theme. Passed to container component."
    columns:
      title: "Columns"
      type: "integer"
      enum: [1, 2, 3, 4, 5, 6, 7, 8]
      description: "Number of column slots to render in a grid."
    gap:
      title: "Gap"
      type: "string"
      enum: ["none", "sm", "md", "lg"]
      description: "Gap between columns."
slots:
  header:
    title: "Header"
    description: "Header content. Passed to container component."
  background:
    title: "Background media"
    description: "Background element. Passed to container component."
  column_1:
    title: "Column 1"
  column_2:
    title: "Column 2"
  column_3:
    title: "Column 3"
  column_4:
    title: "Column 4"
  column_5:
    title: "Column 5"
  column_6:
    title: "Column 6"
  column_7:
    title: "Column 7"
  column_8:
    title: "Column 8"
thirdPartySettings:
  sdcStorybook:
    disableBasicStory: true
libraryOverrides:
  css:
    component:
      css/utilities.src.css: {}

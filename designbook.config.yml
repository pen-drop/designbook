backend: drupal
frameworks:
  component: sdc
  css: tailwind
extensions:
  - id: canvas
    url: https://www.drupal.org/project/experience_builder
config: packages/integrations/test-integration-drupal/designbook
tmp: packages/integrations/test-integration-drupal/designbook/tmp
outputs:
  config: packages/integrations/test-integration-drupal/designbook
  components: packages/integrations/test-integration-drupal/components
  css: packages/integrations/test-integration-drupal/css/tokens
css:
  app: packages/integrations/test-integration-drupal/css/app.src.css
drupal:
  theme: packages/integrations/test-integration-drupal
cmd: node packages/storybook-addon-designbook/dist/cli.js
storybook_url: "http://localhost:6009"
storybook_root: packages/integrations/test-integration-drupal/
component:
  namespace: 'test_integration_drupal'
  src: packages/integrations/test-integration-drupal/components
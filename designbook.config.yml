backend: drupal
extensions:
  - layout_builder
frameworks:
  component: sdc
  css: tailwind
dist: packages/integrations/test-integration-drupal/designbook
tmp: packages/integrations/test-integration-drupal/designbook/tmp
css:
  app: packages/integrations/test-integration-drupal/css/app.src.css
drupal:
  theme: packages/integrations/test-integration-drupal
cmd: 'node packages/storybook-addon-designbook/dist/cli.js'

workflow:
  rules:
    create-component:
      - "Komponenten-Namen immer auf Englisch, kebab-case"
    debo-design-component:dialog:
      - "Immer nach dem Figma-Link fragen bevor die Anforderungen aufgenommen werden"

  tasks:
    create-component:
      - "Nach Erstellung prüfen ob die Komponente im Storybook ohne Fehler rendert"
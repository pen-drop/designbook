$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json

name: Layout columns
group: Layout system
status: experimental
description: >
  A layout wrapper component designed specifically for Drupal's layout systems
  such as Layout Builder and Layout Paragraphs, which require fixed, named slots
  for each column. This component exists to provide those fixed column slots while
  still allowing background media, headers, alignment, and spacing controls.
  It supports up to five column slots and internally renders the "layout" component,
  which in turn uses the "grid" component to arrange the content. For manual Twig
  usage or more flexible layouts, prefer using "layout" directly.

props:
  type: object
  properties:
    display_header:
      title: Header
      type: boolean
      description: >
        If enabled, renders the header slot above the section content.
    theme:
      title: Theme
      type: string
      enum:
        - light
        - dark
        - cyberpunk
        - valentine
      description: >
        Visual theme applied to the section. This can influence colors, backgrounds,
        and other theme-specific styles.
    items_count:
      type: integer
      title: Cells
      enum:
        - 1
        - 2
        - 3
        - 4
        - 5
        - 6
        - 7
        - 8
      description: >
        The number of cells in this layout. Determines how many column
        slots are filled when rendering.
    attributes:
      title: Layout attributes
      $ref: "ui-patterns://attributes"
      description: >
        Attributes for the layout container. Use to add layout-related utility
        classes, semantic attributes, or ARIA roles.
    alignment_attributes:
      title: Alignment attributes
      $ref: "ui-patterns://attributes"
      description: >
        Attributes applied to all column wrappers to control alignment (e.g.,
        text alignment, flex/grid positioning).
    spacing_attributes:
      title: Spacing attributes
      $ref: "ui-patterns://attributes"
      description: >
        Attributes controlling spacing around the section (e.g., padding, margins).

slots:
  background:
    title: Background media
    description: >
      Background media element for the section, such as an image, video, or decorative
      pattern. Rendered behind the section content.
  header:
    title: Header
    description: >
      The section's main heading or title, displayed above the content when
      "display_header" is enabled.
  column_1:
    title: First Column
    description: >
      Content for the first column of the section.
  column_2:
    title: Second Column
    description: >
      Content for the second column of the section.
  column_3:
    title: Third Column
    description: >
      Content for the third column of the section.
  column_4:
    title: Fourth Column
    description: >
      Content for the fourth column of the section.
  column_5:
    title: Fifth Column
    description: >
      Content for the fifth column of the section.
  column_6:
    title: 6 Column
    description: >
      Content for the 6 column of the section.
  column_7:
    title: 7 Column
    description: >
      Content for the 7 column of the section.
  column_8:
    title: 8 Column
    description: >
      Content for the 8 column of the section.
thirdPartySettings:
  sdcStorybook:
    disableBasicStory: true

$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json

name: Slider
status: stable
description: Flexible egjs-flicking slider component
provider: daisy_cms_daisyui

variants:
  prev:
    title: Start Align
    description: Panels aligned to start
  circular:
    title: Circular
    description: Infinite circular scrolling

props:
  type: object
  properties:
    attributes:
      title: Attributes
      $ref: "ui-patterns://attributes"
      description: >
        CSS classes applied to the main layout container. These classes are
        provided by UI Styles, allowing easy selection of predefined layout
        styles without writing custom CSS.
    spacing_attributes:
      title: Spacing attributes
      $ref: "ui-patterns://attributes"
      description: >
        Attributes controlling spacing around the section (e.g., padding, margins).
    theme:
      title: Theme
      type: string
      enum:
        - light
        - dark
        - cyberpunk
        - valentine
      description: >
        Visual theme applied to the section. This can influence colors, backgrounds,
        and other theme-specific styles.
    show_arrows:
      type: boolean
      title: Show Navigation Arrows
      description: Display prev/next arrow buttons
    show_pagination:
      type: boolean
      title: Show Pagination
      description: Display pagination bullets
    auto_play:
      type: boolean
      title: Enable Autoplay
      description: Automatically advance slides
    panels_per_view:
      type: integer
      title: Panels per view
      enum:
        - 1
        - 2
        - 3
        - 4

slots:
  items:
    title: Slider Items
    description: Content for each slide
thirdPartySettings:
  sdcStorybook:
    disableBasicStory: true

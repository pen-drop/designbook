$schema: http://json-schema.org/draft-07/schema#
$id: https://raw.githubusercontent.com/pen-drop/designbook/1.x/schemas/data-model.schema.yml
title: Pendrop Content Schema
description: Schema for Pendrop content and configuration structure data
type: object
properties:
  content:
    type: object
    title: Content
    description: "Content structure: content -> entity_type -> bundle -> field"
    additionalProperties:
      $ref: "#/definitions/entity_type"
  config:
    type: object
    title: Configuration
    description: "Configuration structure: config -> config_type -> config_item"
    properties:
      views:
        type: object
        title: Views
        description: Drupal Views configurations
        additionalProperties:
          $ref: "#/definitions/view"
    additionalProperties:
      type: object
      description: Additional configuration types can be added here
required:
  - content
definitions:
  entity_type:
    type: object
    title: Entity Type
    description: "Entity type definition (e.g., node, block_content, media, taxonomy)"
    additionalProperties:
      $ref: "#/definitions/bundle"
  bundle:
    type: object
    title: Bundle
    description: Bundle definition with its fields and optional view mode display mappings
    properties:
      fields:
        type: object
        title: Fields
        description: Field definitions for this bundle
        additionalProperties:
          $ref: "#/definitions/field"
      view_modes:
        type: object
        title: View Modes
        description: Display configuration per view mode. Each view mode maps entity fields to UI components for rendering.
        additionalProperties:
          $ref: "#/definitions/view_mode"
    additionalProperties: true
  view_mode:
    type: object
    title: View Mode
    description: "A named display configuration (e.g., full, teaser) defining how entity fields map to UI components"
    properties:
      mapping:
        type: array
        title: Component Mapping
        description: Ordered list of component entries. Each entry maps entity fields to a UI component via props and slots. Render order follows array order.
        items:
          $ref: "#/definitions/mapping_entry"
    required:
      - mapping
    additionalProperties: false
  mapping_entry:
    type: object
    title: Mapping Entry
    description: "Maps entity field(s) to a UI component. String values starting with $ are resolved as field references (e.g., $title, $field_media.url). Other values are static."
    properties:
      component:
        type: string
        description: Component name (without provider prefix). Provider is added at render time.
      props:
        type: object
        title: Props
        description: Data/configuration values passed to the component. Values prefixed with $ are resolved from entity fields.
        additionalProperties: true
      slots:
        type: object
        title: Slots
        description: "Rendered content slots. Simple $field_name strings, nested component arrays, or {type: entity} refs for cross-entity rendering."
        additionalProperties: true
    required:
      - component
    additionalProperties: false
  field:
    type: object
    title: Field
    description: Field definition
    properties:
      type:
        type: string
        description: "Field type (string, text, integer, boolean, reference, link, component, layout, etc.)"
      title:
        type: string
        description: Field title
      description:
        type: string
        description: Field description
      required:
        type: boolean
        description: Whether this field is required
      multiple:
        type: boolean
        description: Whether this field can have multiple values
      default:
        description: Default value for this field
      settings:
        type: object
        description: Field-specific settings
        additionalProperties: true
    required:
      - type
    additionalProperties: true
  view:
    type: object
    title: View
    description: View configuration
    properties:
      base_entity:
        type: string
        description: Base entity type
      bundle:
        type: string
        description: Content type bundle
      sorting:
        type: string
        description: Default sorting field
      limit:
        type: integer
        description: Items per page
      hasPager:
        type: boolean
        description: Enable pager
      hint:
        type: string
        description: View configuration hint
    required:
      - base_entity
      - bundle
    additionalProperties: true

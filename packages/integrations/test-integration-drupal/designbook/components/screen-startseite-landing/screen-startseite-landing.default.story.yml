name: default
slots:
  content:
    # Header
    - type: component
      component: "daisy_cms_daisyui:header"
      props:
        variant: default
      slots:
        logo:
          - type: component
            component: "daisy_cms_daisyui:logo"
            props:
              name: "keytec"
              url: "/"
        navigation:
          - type: component
            component: "daisy_cms_daisyui:navigation"
            props:
              variant: primary
              items:
                - label: "Über uns"
                  url: "/ueber-uns"
                - label: "Leistungen"
                  url: "/leistungen"
                - label: "Projekte"
                  url: "/projekte"
                - label: "Blog"
                  url: "/blog"
                - label: "Open Source"
                  url: "/open-source"
                - label: "Kontakt"
                  url: "/kontakt"

    # Hero
    - type: component
      component: "daisy_cms_daisyui:layout"
      props:
        columns: 2
        container: md
      slots:
        items:
          - type: component
            component: "daisy_cms_daisyui:figure"
            props:
              src: "https://placehold.co/908x750/1A1A2E/fff?text=keytec"
              alt: "keytec Drupal-Agentur München"
              full_width: true
          - type: component
            component: "daisy_cms_daisyui:text-block"
            props:
              content: >
                <div class="flex flex-col justify-center gap-4 h-full">
                  <h1 class="text-[35px] leading-[41px] lg:text-[60px] lg:leading-[74px] font-bold tracking-[1px]">Mit Drupal auf Zielkurs.</h1>
                  <p class="text-[16px] leading-[22px] lg:text-[20px] lg:leading-[27px] font-medium text-base-content/70">Seit mehr als 15 Jahren zählen wir zu den führenden Drupal-Agenturen in Deutschland.</p>
                  <div class="flex gap-4 mt-4">
                    <div class="relative inline-block group">
                      <div class="absolute inset-0 translate-x-1.5 translate-y-1.5 bg-neutral"></div>
                      <a href="/leistungen" class="relative inline-flex items-center justify-center px-5 py-4 font-[800] uppercase text-[14px] leading-[24px] tracking-[1px] lg:text-[18px] lg:leading-[24px] lg:tracking-[2px] bg-secondary text-secondary-content transition-transform duration-300 ease-in-out md:group-hover:-translate-y-1.5 md:group-hover:-translate-x-1.5">Leistungen</a>
                    </div>
                    <div class="relative inline-block group">
                      <div class="absolute inset-0 translate-x-1.5 translate-y-1.5 bg-neutral"></div>
                      <a href="/kontakt" class="relative inline-flex items-center justify-center px-5 py-4 font-[800] uppercase text-[14px] leading-[24px] tracking-[1px] lg:text-[18px] lg:leading-[24px] lg:tracking-[2px] bg-accent text-accent-content transition-transform duration-300 ease-in-out md:group-hover:-translate-y-1.5 md:group-hover:-translate-x-1.5">Kontakt</a>
                    </div>
                  </div>
                </div>

    # Leistungen-Teaser
    - type: component
      component: "daisy_cms_daisyui:layout"
      props:
        columns: 3
        container: md
      slots:
        items:
          - type: component
            component: "daisy_cms_daisyui:heading"
            props:
              text: "Leistungen als Drupal Agentur"
              level: h2
              preheadline: "Unsere Expertise für Ihren Erfolg"
          - type: component
            component: "daisy_cms_daisyui:card"
            props:
              variant: horizontal
              title: "Beratung"
              description: "Dank unserer Jahrzehnte langer Erfahrung können wir Sie umfangreich beraten und so die optimalste und nachhaltigste IT-Lösungen für Sie erarbeiten."
            slots:
              icon:
                - type: element
                  tag: span
                  value: "j"
              actions:
                - type: component
                  component: "daisy_cms_daisyui:button"
                  props:
                    variant: link
                    url: "/leistungen"
                  slots:
                    text:
                      - type: element
                        value: "Mehr erfahren"
          - type: component
            component: "daisy_cms_daisyui:card"
            props:
              variant: horizontal
              title: "Design"
              description: "Wir kreieren nutzerfreundliche und visuell ansprechende Designs, die Ihre Markenbotschaft klar kommunizieren."
            slots:
              icon:
                - type: element
                  tag: span
                  value: "F"
              actions:
                - type: component
                  component: "daisy_cms_daisyui:button"
                  props:
                    variant: link
                    url: "/leistungen"
                  slots:
                    text:
                      - type: element
                        value: "Mehr erfahren"
          - type: component
            component: "daisy_cms_daisyui:card"
            props:
              variant: horizontal
              title: "Entwicklung"
              description: "Von der Konzeption bis zum Launch: Wir entwickeln skalierbare, leistungsstarke Webprojekte auf Drupal-Basis."
            slots:
              icon:
                - type: element
                  tag: span
                  value: "l"
              actions:
                - type: component
                  component: "daisy_cms_daisyui:button"
                  props:
                    variant: link
                    url: "/leistungen"
                  slots:
                    text:
                      - type: element
                        value: "Mehr erfahren"

    # Projekte-Teaser
    - type: component
      component: "daisy_cms_daisyui:layout"
      props:
        columns: 3
        container: md
      slots:
        items:
          - type: component
            component: "daisy_cms_daisyui:heading"
            props:
              text: "Unsere Drupal-Projekte"
              level: h2
          - type: component
            component: "daisy_cms_daisyui:card"
            props:
              variant: vertical
              title: "Franke & Bornberg"
              preheadline: "Projekt"
              description: "Multibrand-Designsystem mit Drupal und Figma für eine der führenden Versicherungsrating-Agenturen."
            slots:
              media:
                - type: image
                  uri: "https://placehold.co/600x400/494FE5/fff?text=Franke+%26+Bornberg"
              actions:
                - type: component
                  component: "daisy_cms_daisyui:button"
                  props:
                    variant: link
                    url: "/projekte/franke-bornberg"
                  slots:
                    text:
                      - type: element
                        value: "ansehen"
          - type: component
            component: "daisy_cms_daisyui:card"
            props:
              variant: vertical
              title: "Dr. Schär"
              preheadline: "Projekt"
              description: "Globale Plattform für den Marktführer im Bereich glutenfreie Ernährung mit Drupal-Multisite."
            slots:
              media:
                - type: image
                  uri: "https://placehold.co/600x400/FF4E42/fff?text=Dr.+Schär"
              actions:
                - type: component
                  component: "daisy_cms_daisyui:button"
                  props:
                    variant: link
                    url: "/projekte/dr-schaer"
                  slots:
                    text:
                      - type: element
                        value: "ansehen"
          - type: component
            component: "daisy_cms_daisyui:card"
            props:
              variant: vertical
              title: "Bayerische Verwaltungsschule"
              preheadline: "Projekt"
              description: "Digitalisierung des Fortbildungsangebots für die öffentliche Verwaltung."
            slots:
              media:
                - type: image
                  uri: "https://placehold.co/600x400/FFC024/000?text=BVS"
              actions:
                - type: component
                  component: "daisy_cms_daisyui:button"
                  props:
                    variant: link
                    url: "/projekte/bvs"
                  slots:
                    text:
                      - type: element
                        value: "ansehen"

    # Kundenzitat
    - type: component
      component: "daisy_cms_daisyui:layout"
      props:
        columns: 1
        container: md
      slots:
        items:
          - type: component
            component: "daisy_cms_daisyui:quote-block"
            props:
              quote: "Mit keytec haben wir dank der tiefgehenden Drupal-Expertise und der Erfahrung des Teams den richtigen Partner für unsere globalen Kommunikations- und Servicebedürfnisse gefunden."
              author: "Domenique Hopfgartner, Corporate Digital Marketing"
            slots:
              media:
                - type: image
                  uri: "https://placehold.co/200x80/fff/333?text=Schär"

    # Blog-Teaser
    - type: component
      component: "daisy_cms_daisyui:layout"
      props:
        columns: 3
        container: md
      slots:
        items:
          - type: component
            component: "daisy_cms_daisyui:heading"
            props:
              text: "Aus unserem Blog"
              level: h2
          - type: component
            component: "daisy_cms_daisyui:card"
            props:
              variant: vertical
              title: "Drupal 7 EOL"
              preheadline: "End of Life"
              description: "Was das Auslaufen von Drupal 7 für Ihr Projekt bedeutet"
            slots:
              media:
                - type: image
                  uri: "https://placehold.co/600x400/832626/fff?text=Drupal+7+EOL"
              actions:
                - type: component
                  component: "daisy_cms_daisyui:button"
                  props:
                    variant: link
                  slots:
                    text:
                      - type: element
                        value: "Lesen"
          - type: component
            component: "daisy_cms_daisyui:card"
            props:
              variant: vertical
              title: "KI-Übersetzung"
              preheadline: "Drupal-KI"
              description: "Webseitenübersetzung mit KI und Drupal"
            slots:
              media:
                - type: image
                  uri: "https://placehold.co/600x400/494FE5/fff?text=AI+Translation"
              actions:
                - type: component
                  component: "daisy_cms_daisyui:button"
                  props:
                    variant: link
                  slots:
                    text:
                      - type: element
                        value: "Lesen"
          - type: component
            component: "daisy_cms_daisyui:card"
            props:
              variant: vertical
              title: "Open Source für Unternehmen"
              preheadline: "Beitrag"
              description: "Open Source als Treiber für Unternehmens-Innovation"
            slots:
              media:
                - type: image
                  uri: "https://placehold.co/600x400/FF4E42/fff?text=Open+Source"
              actions:
                - type: component
                  component: "daisy_cms_daisyui:button"
                  props:
                    variant: link
                  slots:
                    text:
                      - type: element
                        value: "Lesen"

    # Kontaktbereich
    - type: component
      component: "daisy_cms_daisyui:layout"
      props:
        columns: 2
        container: md
      slots:
        items:
          - type: component
            component: "daisy_cms_daisyui:text-block"
            props:
              content: >
                <div class="flex flex-col justify-center gap-4 h-full">
                  <h2 class="text-[30px] leading-[36px] lg:text-[48px] lg:leading-[58px] font-bold">Sie suchen eine Drupal Agentur für die Entwicklung nachhaltiger digitaler Projekte?</h2>
                  <div class="relative inline-block group w-fit">
                    <div class="absolute inset-0 translate-x-1.5 translate-y-1.5 bg-neutral"></div>
                    <a href="/kontakt" class="relative inline-flex items-center justify-center px-5 py-4 font-[800] uppercase text-[14px] leading-[24px] tracking-[1px] lg:text-[18px] lg:leading-[24px] lg:tracking-[2px] bg-secondary text-secondary-content transition-transform duration-300 ease-in-out md:group-hover:-translate-y-1.5 md:group-hover:-translate-x-1.5">Jetzt anfragen</a>
                  </div>
                </div>
          - type: component
            component: "daisy_cms_daisyui:contact-card"
            props:
              variant: default
              darkmode: false
              name: "Thomas Mfinanga"
              position: "Projektmanager"
              email: "thomas.mfinanga@keytec.de"
              phone: "+49 (0) 89 5419 89 81"
              image_url: "https://placehold.co/187x187/FFC024/000?text=TM"
              image_alt: "Thomas Mfinanga"

    # Footer
    - type: component
      component: "daisy_cms_daisyui:footer"
      slots:
        navigation:
          - type: component
            component: "daisy_cms_daisyui:navigation"
            props:
              variant: footer
              items:
                - label: "Datenschutz"
                  url: "/datenschutz"
                - label: "Impressum"
                  url: "/impressum"
        copyright:
          - type: component
            component: "daisy_cms_daisyui:copyright"
            props:
              text: "© 2026 keytec GmbH & Co. KG. Alle Rechte vorbehalten."

name: full
slots:
  content:
    - type: component
      component: "daisy_cms_daisyui:layout"
      props:
        attributes:
          class: ["grid-2 container-md"]
        spacing_attributes:
          class: ["pt-auto pb-auto"]
      slots:
        items:
          - type: component
            component: "daisy_cms_daisyui:figure"
            props:
              src: "https://placehold.co/800x600?text=keytec"
              alt: "keytec Drupal-Agentur München"
              full_width: true
          - type: component
            component: "daisy_cms_daisyui:heading"
            props:
              text: "Mit Drupal auf Zielkurs."
              level: h1
              preheadline: "keytec — Die Drupal-Agentur aus München"

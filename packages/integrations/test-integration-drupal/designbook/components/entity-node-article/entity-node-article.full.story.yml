name: full
designbook:
  entity:
    type: node
    bundle: article
    view_mode: full
slots:
  content:
    - type: component
      component: 'daisy_cms_daisyui:badge'
      props:
        text:
          type: ref
          field: field_teaser_preheadline
        variant: primary
    - type: component
      component: 'daisy_cms_daisyui:heading'
      props:
        text:
          type: ref
          field: title
        html_tag: h1
        variant: hero
    - type: component
      component: 'daisy_cms_daisyui:figure'
      props:
        src:
          type: ref
          field: field_media
        alt:
          type: ref
          field: title
    - type: component
      component: 'daisy_cms_daisyui:text-block'
      slots:
        content:
          - type: element
            value:
              type: ref
              field: body

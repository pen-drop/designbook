name: full
slots:
  content:
    - type: component
      component: 'daisy_cms_daisyui:hero'
      props:
        variant: landing
        title:
          type: ref
          ref: 'field:title'
        subtitle:
          type: ref
          ref: 'field:field_teaser_description'
        background_color: '#C82828'
      slots:
        media:
          - type: ref
            ref: 'field:field_media'
        actions:
          - type: component
            component: 'daisy_cms_daisyui:button'
            props:
              variant: primary
              color: sun
              url: '/kontakt'
            slots:
              text:
                - type: element
                  value: Beratung Anfordern
    - type: element
      value:
        type: ref
        ref: 'field:body'

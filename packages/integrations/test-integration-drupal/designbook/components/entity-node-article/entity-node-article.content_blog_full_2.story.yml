name: content_blog_full_2
slots:
  content:
    - type: component
      component: daisy_cms_daisyui:badge
      props:
        text: Barrierefreiheit
        variant: primary
    - type: component
      component: daisy_cms_daisyui:heading
      props:
        text: Barrierefreie Drupal-Anwendungen – So wird Ihre Website BFSG-konform
        html_tag: h1
        variant: hero
    - type: component
      component: daisy_cms_daisyui:figure
      props:
        src: media.image.3
        alt: Barrierefreie Drupal-Anwendungen – So wird Ihre Website BFSG-konform
    - type: component
      component: daisy_cms_daisyui:text-block
      slots:
        content:
          - type: element
            value: >-
              <h2>BFSG – Was bedeutet das für Ihre Website?</h2><p>Das
              Barrierefreiheitsstärkungsgesetz verpflichtet Unternehmen, ihre
              digitalen Angebote barrierefrei zu gestalten.</p>

name: content_blog_full_0
slots:
  content:
    - type: component
      component: daisy_cms_daisyui:badge
      props:
        text: Drupal Update
        variant: primary
    - type: component
      component: daisy_cms_daisyui:heading
      props:
        text: >-
          Upgrade auf Drupal 11 – Verbesserte Leistung, Sicherheit und
          Funktionalität
        html_tag: h1
        variant: hero
    - type: component
      component: daisy_cms_daisyui:figure
      props:
        src: media.image.1
        alt: >-
          Upgrade auf Drupal 11 – Verbesserte Leistung, Sicherheit und
          Funktionalität
    - type: component
      component: daisy_cms_daisyui:text-block
      slots:
        content:
          - type: element
            value: >-
              <h2>Warum auf Drupal 11 aktualisieren?</h2><p>Der offizielle
              Support für Drupal 9 wurde im November 2023 eingestellt. Das
              bedeutet, dass es keine Sicherheitsupdates, Bugfixes oder
              Unterstützung durch die Community mehr gibt.</p><h2>4 Gründe,
              jetzt auf Drupal 11 zu
              wechseln</h2><ol><li><strong>Sicherheit</strong> — Drupal 11
              bietet essenzielle Sicherheitsupdates und unterstützt PHP
              8.3.</li><li><strong>Funktionalität</strong> — Neue Features und
              ein verbesserter Layout
              Builder.</li><li><strong>Unterstützung</strong> — Langfristige
              Wartung und
              Community-Support.</li><li><strong>Kompatibilität</strong> —
              Aktuelle Webstandards und moderne
              Frameworks.</li></ol><h2>Fazit</h2><p>Ein Upgrade auf Drupal 11
              sichert Ihre Website für die Zukunft — mit besserer Leistung,
              Sicherheit und Funktionalität.</p>

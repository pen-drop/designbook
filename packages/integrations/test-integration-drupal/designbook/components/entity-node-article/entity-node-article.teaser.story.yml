name: teaser
slots:
  content:
    - type: component
      component: 'daisy_cms_daisyui:card'
      props:
        variant: default
        preheadline:
          type: ref
          ref: 'field:field_teaser_preheadline'
        title:
          type: ref
          ref: 'field:title'
        description:
          type: ref
          ref: 'field:field_teaser_description'
      slots:
        media:
          - type: ref
            ref: 'field:field_media'
        actions:
          - type: component
            component: 'daisy_cms_daisyui:button'
            props:
              variant: default
              color:
                type: ref
                ref: 'field:field_teaser_button_color'
            slots:
              text:
                - type: ref
                  ref: 'field:field_button_text'

name: content_blog_teaser_1
slots:
  content:
    - type: component
      component: daisy_cms_daisyui:article-card
      props:
        href: '#'
      slots:
        media:
          - type: component
            component: daisy_cms_daisyui:figure
            props:
              src: media.image.2
              alt: 'Drupal & KI: Zukunft gestalten'
        content:
          - type: component
            component: daisy_cms_daisyui:badge
            props:
              text: Automatisierung & Effizienz
              variant: primary
          - type: component
            component: daisy_cms_daisyui:heading
            props:
              text: 'Drupal & KI: Zukunft gestalten'
              html_tag: h3
              variant: default
          - type: component
            component: daisy_cms_daisyui:text-block
            slots:
              content:
                - type: element
                  value: >-
                    Erfahren Sie, wie Keytec Drupal mit Künstlicher Intelligenz
                    verbindet, um Prozesse zu automatisieren und personalisierte
                    Nutzererlebnisse zu schaffen.

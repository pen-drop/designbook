name: content_blog_full_1
slots:
  content:
    - type: component
      component: daisy_cms_daisyui:badge
      props:
        text: Automatisierung & Effizienz
        variant: primary
    - type: component
      component: daisy_cms_daisyui:heading
      props:
        text: 'Drupal & KI: Zukunft gestalten'
        html_tag: h1
        variant: hero
    - type: component
      component: daisy_cms_daisyui:figure
      props:
        src: media.image.2
        alt: 'Drupal & KI: Zukunft gestalten'
    - type: component
      component: daisy_cms_daisyui:text-block
      slots:
        content:
          - type: element
            value: >-
              <h2>Künstliche Intelligenz in Drupal</h2><p>Die Integration von KI
              in Drupal eröffnet völlig neue Möglichkeiten für Redakteure und
              Entwickler. Von der automatischen Verschlagwortung bis zur
              Generierung von Inhalten – die Zukunft ist da.</p><h2>Vorteile der
              Integration</h2><ul><li><strong>Automatisierung:</strong>
              Reduzieren Sie manuelle Aufgaben durch intelligente
              Workflows.</li><li><strong>Personalisierung:</strong> Bieten Sie
              Ihren Nutzern maßgeschneiderte Inhalte in
              Echtzeit.</li><li><strong>Effizienz:</strong> Beschleunigen Sie
              Content-Prohsesse durch KI-gestützte Tools.</li></ul><p>Starten
              Sie jetzt mit Keytec in die Zukunft der digitalen Experience.</p>

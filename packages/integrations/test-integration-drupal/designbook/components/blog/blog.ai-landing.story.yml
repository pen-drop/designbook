        preheadline: AI Chatbot
        title: 'Coming up next: AI Assistance'
        description: Erleben Sie die Zukunft mit AI Assistance in Drupal! Integrieren Sie smarte Chatbots, die Ihre Nutzer in Echtzeit unterstützen.
      slots:
        media:
          - type: element

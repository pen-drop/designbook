name: ai-landing
slots:
  header:
    - type: component
      component: 'daisy_cms_daisyui:header'
      story: default
  content:
    - type: component
      component: 'daisy_cms_daisyui:breadcrumb'
      props:
        items:
          - label: Home
            url: /
          - label: Blog
            url: /blog
          - label: Drupal & KI Integration
            url: ''
    - type: component
      component: 'daisy_cms_daisyui:hero'
      props:
        variant: landing
        title: AI und Drupal
        subtitle: Der Schlüssel zu effizienteren Websites und smarteren Prozessen
        background_color: '#C82828'
      slots:
        media:
          - type: element
            value: '<img src="https://placehold.co/600x400/C82828/fff?text=AI+Collage" alt="AI Integration Collage" />'
        actions:
          - type: component
            component: 'daisy_cms_daisyui:button'
            props:
              variant: primary
              color: sun
              url: '/kontakt'
            slots:
              text:
                - type: element
                  value: Beratung Anfordern
    - type: element
      value: '<div class="body-content"><p>Künstliche Intelligenz hält in immer mehr Bereiche Einzug – von der Automatisierung im Kundenservice bis hin zur intelligenten Datenanalyse. Auch in der Drupal-Welt eröffnen sich durch AI völlig neue Möglichkeiten, um Websites leistungsfähiger, effizienter und nutzerfreundlicher zu gestalten.</p><h2>Warum Drupal &amp; AI?</h2><p>Mit den neuesten Entwicklungen im Bereich der Künstlichen Intelligenz lassen sich Drupal-Websites auf völlig neue Weise verbessern. Ob automatisierte Übersetzungen, SEO-optimierte Inhalte oder personalisierte Nutzererlebnisse – Eine Drupal-AI-Integration bietet zahlreiche Möglichkeiten, Zeit zu sparen, Prozesse zu optimieren und die Qualität von Webprojekten zu steigern.</p><h3>Flexibel und modular</h3><p>Das <a href="https://www.drupal.org/project/ai">Drupal AI Modul</a> bietet eine flexible und modulare KI-Integration für Drupal. Dank zahlreicher Submodule lassen sich spezifische AI-Funktionen gezielt aktivieren – von automatisierter Texterstellung bis hin zu Übersetzungen oder Backend Chatbots.</p><p>Die AI-Integration ist Anbieterunabhängig, was sie äußerst flexibel macht.</p><p>Die tiefe Drupal-Integration sorgt dafür, dass AI direkt im CMS nutzbar ist – ob in CKEditor, beim Übersetzen oder in Workflows.</p><h2>Was erwartet Sie hier?</h2><p>In dieser Artikelreihe zeigen wir Ihnen, welche AI-gestützten Lösungen es für Drupal gibt und wie sie ihr digitales Business voranbringen können.</p><p>Sie möchten die Vorteile von <strong>Drupal AI</strong> für Ihr Unternehmen nutzen? Dann lassen Sie uns darüber sprechen! <a href="/kontakt">Kontaktieren Sie uns jetzt</a>.</p></div>'
    - type: component
      component: 'daisy_cms_daisyui:card'
      props:
        variant: default
        preheadline: AI Translation
        title: KI Übersetzung in Drupal
        description: Der Artikel zeigt praxisnahe Beispiele, wie KI-gestützte Übersetzungslösungen in Drupal den Übersetzungsprozess optimieren.
      slots:
        media:
          - type: element
            value: '<img src="https://placehold.co/800x450/F5D042/333?text=KI+Übersetzung" alt="KI Übersetzung" />'
        actions:
          - type: component
            component: 'daisy_cms_daisyui:button'
            props:
              variant: default
              color: sun
            slots:
              text:
                - type: element
                  value: Mehr
    - type: component
      component: 'daisy_cms_daisyui:card'
      props:
        variant: default
        preheadline: AI Content
        title: Content Erstellung mit Drupal AI
        description: Optimieren Sie Ihre Content-Erstellung mit Drupal AI! Von automatischer Texterstellung über Rechtschreibprüfung bis zur SEO-Optimierung.
      slots:
        media:
          - type: element
            value: '<img src="https://placehold.co/800x450/4A90D9/fff?text=Content+Erstellung" alt="Content Erstellung" />'
        actions:
          - type: component
            component: 'daisy_cms_daisyui:button'
            props:
              variant: default
              color: ocean
            slots:
              text:
                - type: element
                  value: Mehr
    - type: component

designbook:
  testdata: designbook/sections/blog/data.json
  entity_type: node
  bundle: article
  record: 0

name: Preview
slots:
  header:
    - type: component
      component: 'daisy_cms_daisyui:logo'
      props:
        name: "keytec"
        url: "/"
    - type: component
      component: 'daisy_cms_daisyui:nav-main'
      props:
        items:
          - label: "Startseite"
            url: "/startseite"
          - label: "Leistungen"
            url: "/leistungen"
          - label: "Projekte"
            url: "/projekte"
          - label: "Über uns"
            url: "/ueber-uns"
          - label: "Blog"
            url: "/blog"
            active: true
          - label: "Kontakt"
            url: "/kontakt"
  content:
    - type: component
      component: 'daisy_cms_daisyui:figure'
      props:
        src: '$ref:field_media.url'
        alt: '$ref:field_media.alt'
        full_width: true
    - type: component
      component: 'daisy_cms_daisyui:heading'
      props:
        text: '$ref:title'
        level: h1
        preheadline: '$ref:field_teaser_preheadline'
    - type: component
      component: 'daisy_cms_daisyui:text-block'
      props:
        content: '$ref:body'
    - type: component
      component: 'daisy_cms_daisyui:contact-card'
      props:
        name: '$ref:block_content.contact_person.0.field_name'
        title: '$ref:block_content.contact_person.0.field_title'
        email: '$ref:block_content.contact_person.0.field_email'
        phone: '$ref:block_content.contact_person.0.field_phone'
        image_src: '$ref:block_content.contact_person.0.field_media.url'
        variant: author
    - type: component
      component: 'daisy_cms_daisyui:cta-banner'
      props:
        headline: "Sie benötigen Unterstützung?"
        text: "Dank unserer spezialisierten Drupal-Dienste können wir auf eine Vielzahl erfolgreicher Projekte zurückblicken. Kontaktieren Sie uns und starten wir Ihr Projekt."
        button_label: "Kontakt aufnehmen"
        button_url: "/kontakt"
        variant: ocean
    - type: component
      component: 'daisy_cms_daisyui:heading'
      props:
        text: "Das könnte Sie auch interessieren"
        level: h2
    - type: component
      component: 'daisy_cms_daisyui:article-teaser'
      props:
        title: '$ref:node.article.1.title'
        preheadline: '$ref:node.article.1.field_teaser_preheadline'
        image_src: '$ref:node.article.1.field_media.url'
        image_alt: '$ref:node.article.1.field_media.alt'
        url: "/blog/drupal-ki"
        button_text: '$ref:node.article.1.field_button_text'
        button_color: '$ref:node.article.1.field_teaser_button_color'
    - type: component
      component: 'daisy_cms_daisyui:article-teaser'
      props:
        title: '$ref:node.article.2.title'
        preheadline: '$ref:node.article.2.field_teaser_preheadline'
        image_src: '$ref:node.article.2.field_media.url'
        image_alt: '$ref:node.article.2.field_media.alt'
        url: "/blog/barrierefreiheit"
        button_text: '$ref:node.article.2.field_button_text'
        button_color: '$ref:node.article.2.field_teaser_button_color'
  footer:
    - type: component
      component: 'daisy_cms_daisyui:nav-footer'
      props:
        items:
          - label: "Datenschutz"
            url: "/datenschutz"
          - label: "Impressum"
            url: "/impressum"
          - label: "AGB"
            url: "/agb"
    - type: component
      component: 'daisy_cms_daisyui:copyright'
      props:
        text: "© 2026 keytec. All rights reserved."

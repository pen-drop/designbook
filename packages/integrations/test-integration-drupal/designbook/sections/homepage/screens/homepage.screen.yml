name: PetMatch Homepage
section: homepage
layout:
  page:
    - component: page
      slots:
        header:
          - component: header
            props:
              logo: "PetMatch"
              nav_items:
                - { label: "Home", href: "/" }
                - { label: "Adopt", href: "/adopt" }
        content:
          - component: hero
            props:
              title: "Find Your Best Friend"
              description: "Search pets available for adoption"
            slots:
              search:
                - component: search-filter
                  props:
                    placeholder: "Search for Dogs, Cats, etc."
                    filters: ["Dogs", "Cats"]
          - entity: node.pet
            view_mode: teaser
            records: [0, 1, 2, 3]
          - component: shelter-cta
            props:
              headline: "Are you a shelter?"
              button_text: "Register Now"
        footer:
          - component: footer
            props:
              copyright: "© 2026 PetMatch"
content:
  node:
    pet:
      title: Pet
      description: An animal available for adoption with profile, traits, and media
      fields:
        title:
          type: string
          title: Name
          required: true
        field_body:
          type: text
          title: Description
        field_species:
          type: reference
          title: Species
          settings:
            target_type: taxonomy_term
            target_bundle: species
        field_breed:
          type: string
          title: Breed
        field_age:
          type: string
          title: Age
          description: "e.g. Puppy, Young, Adult, Senior"
        field_gender:
          type: string
          title: Gender
          description: "Male, Female"
        field_size:
          type: string
          title: Size
          description: "Small, Medium, Large, Extra Large"
        field_traits:
          type: reference
          title: Personality Traits
          multiple: true
          settings:
            target_type: taxonomy_term
            target_bundle: trait
        field_media:
          type: reference
          title: Photos
          multiple: true
          settings:
            target_type: media
            target_bundle: image
        field_shelter:
          type: reference
          title: Shelter
          settings:
            target_type: node
            target_bundle: shelter
        field_adoption_status:
          type: string
          title: Adoption Status
          description: "Available, Pending, Adopted"
        field_good_with:
          type: string
          title: Good With
          multiple: true
          description: "Kids, Dogs, Cats, Seniors"
        field_energy_level:
          type: string
          title: Energy Level
          description: "Low, Medium, High"
    shelter:
      title: Shelter
      description: An animal shelter or rescue organization
      fields:
        title:
          type: string
          title: Shelter Name
          required: true
        field_body:
          type: text
          title: About
        field_address:
          type: string
          title: Address
        field_phone:
          type: string
          title: Phone
        field_email:
          type: string
          title: Email
        field_website:
          type: string
          title: Website URL
        field_media:
          type: reference
          title: Logo / Photo
          settings:
            target_type: media
            target_bundle: image
        field_operating_hours:
          type: string
          title: Operating Hours
    article:
      title: Article
      description: Blog articles, adoption tips, and community stories
      fields:
        title:
          type: string
          title: Title
          required: true
        field_body:
          type: text
          title: Body
        field_media:
          type: reference
          title: Hero Image
          settings:
            target_type: media
            target_bundle: image
        field_category:
          type: reference
          title: Category
          settings:
            target_type: taxonomy_term
            target_bundle: article_category
        field_teaser:
          type: string
          title: Teaser Text
    page:
      title: Page
      description: Static pages (About, Privacy, Terms, FAQ)
      fields:
        title:
          type: string
          title: Title
          required: true
        field_body:
          type: text
          title: Body
  paragraph:
    adoption_step:
      title: Adoption Step
      description: A step in the adoption application workflow
      fields:
        field_title:
          type: string
          title: Step Title
          required: true
        field_description:
          type: text
          title: Instructions
        field_icon:
          type: string
          title: Icon
        field_order:
          type: integer
          title: Step Order
    faq_item:
      title: FAQ Item
      description: Frequently asked question with answer
      fields:
        field_question:
          type: string
          title: Question
          required: true
        field_answer:
          type: text
          title: Answer
          required: true
  block_content:
    shelter_cta:
      title: Shelter Call to Action
      description: CTA block encouraging shelters to register
      fields:
        field_title:
          type: string
          title: Headline
          required: true
        field_body:
          type: text
          title: Description
        field_link:
          type: string
          title: CTA Link
    contact_info:
      title: Contact Info
      description: Platform contact information block
      fields:
        field_email:
          type: string
          title: Email
        field_phone:
          type: string
          title: Phone
        field_address:
          type: string
          title: Address
  taxonomy_term:
    species:
      title: Species
      description: Animal species (Dog, Cat, Bird, Rabbit, etc.)
      fields:
        title:
          type: string
          title: Name
          required: true
        field_icon:
          type: string
          title: Icon
    trait:
      title: Personality Trait
      description: Pet personality traits (Friendly, Energetic, Calm, etc.)
      fields:
        title:
          type: string
          title: Trait Name
          required: true
    article_category:
      title: Article Category
      description: Blog post categories (Adoption Tips, Health, Training, etc.)
      fields:
        title:
          type: string
          title: Category Name
          required: true

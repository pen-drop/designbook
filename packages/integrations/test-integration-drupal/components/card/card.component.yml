name: card
label: Card
status: experimental
group: Data Display
thirdPartySettings:
  sdcStorybook:
    disableBasicStory: true
    tags:
      - "!autodocs"
props:
  type: object
  properties:
    variant:
      type: string
      title: Variant
      enum:
        - default
        - horizontal
      default: default
    preheadline:
      type: string
      title: Preheadline
    title:
      type: string
      title: Title
    description:
      type: string
      title: Description
    button_color:
      type: string
      title: Button color
      enum:
        - sun
        - ocean
        - swimsuit
slots:
  media:
    title: Media
    description: Card image
  actions:
    title: Actions
    description: CTA button

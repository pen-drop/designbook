stories:
  preview:
    title: Preview
    props:
      title: "Accordion Title"
      expanded: false
      variant: default
    slots:
      content:
        - type: element
          value: "This is the accordion content that can be expanded and collapsed."
  expanded:
    title: Initially Expanded
    props:
      title: "Pre-expanded Accordion"
      expanded: true
      variant: default
    slots:
      content:
        - type: element
          value: "This accordion starts in an expanded state."
  bordered:
    title: Bordered Variant
    props:
      title: "Bordered Accordion"
      expanded: false
      variant: bordered
    slots:
      content:
        - type: element
          value: "This accordion has a bordered style."
  with_rich_content:
    title: With Rich Content
    props:
      title: "Rich Content Example"
      expanded: false
      variant: default
    slots:
      content:
        - type: element
          tag: div
          value: |
            <h3>Subheading</h3>
            <p>This is a paragraph with <strong>bold text</strong> and <em>italic text</em>.</p>
            <ul>
              <li>List item 1</li>
              <li>List item 2</li>
              <li>List item 3</li>
            </ul>

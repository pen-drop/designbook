$schema: "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: contact_card
status: experimental
group: Data Display
description: "Contact person card from Figma — round photo with accent bg, name, position, email, phone."
provider: daisy_cms_daisyui
variants:
  default:
    title: Default
    description: "Default size, light mode."
  small:
    title: Small
    description: "Compact size, name and position only."
props:
  type: object
  properties:
    variant:
      type: string
      title: Variant
      enum:
        - default
        - small
      default: default
    darkmode:
      type: boolean
      title: Dark Mode
      default: false
    name:
      type: string
      title: Name
    position:
      type: string
      title: Position
    email:
      type: string
      title: Email
    phone:
      type: string
      title: Phone
    image_url:
      type: string
      title: Image URL
    image_alt:
      type: string
      title: Image Alt Text
thirdPartySettings:
  sdcStorybook:
    disableBasicStory: true

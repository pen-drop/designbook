$schema: "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: contact_card
status: experimental
description: "Contact person card with photo, name, role and contact details"
provider: daisy_cms_daisyui
props:
  type: object
  properties:
    name:
      type: string
      title: "Name"
      description: "Person's full name"
    title:
      type: string
      title: "Title/Role"
      description: "Job title or role"
    email:
      type: string
      title: "Email"
      description: "Email address"
    phone:
      type: string
      title: "Phone"
      description: "Phone number"
    image_src:
      type: string
      title: "Photo URL"
      description: "URL to the person's photo"
    variant:
      type: string
      title: "Variant"
      description: "Display variant"
      enum:
        - default
        - author
        - compact
      default: default

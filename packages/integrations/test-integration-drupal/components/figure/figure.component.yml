$schema: "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: figure
status: experimental
description: "Image figure component with optional caption"
provider: daisy_cms_daisyui
props:
  type: object
  properties:
    src:
      type: string
      title: "Image Source"
      description: "URL of the image"
    alt:
      type: string
      title: "Alt Text"
      description: "Alternative text for the image"
    caption:
      type: string
      title: "Caption"
      description: "Optional caption text below the image"
    full_width:
      type: boolean
      title: "Full Width"
      description: "Whether the image spans full width"
      default: false

$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json

name: Layout
group: Layout system
status: experimental
description: >
  A flexible layout component based on UI Styles that defines structure, grid, alignment, spacing, and theming options.
  It can include an optional header, background area, and a list of items arranged in a grid. Designed to be used
  within the Drupal UI UI Styles and UI Patterns UI to make easy extendable.

props:
  type: object
  properties:
    attributes:
      title: Layout attributes
      $ref: "ui-patterns://attributes"
      description: >
        CSS classes applied to the main layout container. These classes are
        provided by UI Styles, allowing easy selection of predefined layout
        styles without writing custom CSS.

    alignment_attributes:
      title: Alignment attributes
      $ref: "ui-patterns://attributes"
      description: >
        CSS classes controlling how content is aligned within the layout. Options
        come from UI Styles for consistent horizontal and vertical alignment.

    spacing_attributes:
      title: Spacing attributes
      $ref: "ui-patterns://attributes"
      description: >
        CSS classes that set padding, margins, and gaps inside the layout.
        All options are defined in UI Styles for easy selection and consistency.

    theme:
      title: Theme
      type: string
      enum:
        - light
        - dark
        - cyberpunk
        - valentine
      description: >
        The visual style of the layout. Available options:
        - light: a bright, minimal appearance
        - dark: a darker color scheme for better contrast
        - cyberpunk: a bold, neon-inspired style
        - valentine: a playful, romantic theme with warm colors

    display_header:
      title: Display header
      type: boolean
      description: >
        Toggles the visibility of the header slot. If enabled, the header slot content will be rendered;
        if disabled, the header area will be omitted.

slots:
  background:
    title: Background
    description: >
      Area used to provide a decorative or functional background for the layout.
      Can contain images, patterns, gradients, or color blocks.

  header:
    title: Header
    description: >
      The top section of the layout, typically containing a title, navigation, or key
      introductory content. Visibility can be controlled using the 'display_header' property.

  content:
    title: Content
    description: >
      Content displayed inside the layout component.

  items:
    title: Grid Items
    description: >
      Items displayed as grid items inside the layout component. Use either items or content.
thirdPartySettings:
  sdcStorybook:
    disableBasicStory: true

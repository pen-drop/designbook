$schema: "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: layout
status: experimental
group: Layout
description: "A flexible layout component with grid columns, spacing, and theming."
provider: daisy_cms_daisyui
props:
  type: object
  properties:
    columns:
      title: Grid Columns
      type: integer
      enum:
        - 1
        - 2
        - 3
        - 4
      default: 1
    container:
      title: Container Size
      type: string
      enum:
        - sm
        - md
        - lg
        - full
      default: md
slots:
  items:
    title: Grid Items
    description: "Items displayed as grid items."
thirdPartySettings:
  sdcStorybook:
    disableBasicStory: true

$schema: "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: logo
status: experimental
description: Site logo with optional link.
provider: daisy_cms_daisyui
thirdPartySettings:
  sdcStorybook:
    disableBasicStory: true
props:
  type: object
  properties:
    src:
      type: string
      title: Image source
      description: URL of the logo image.
    alt:
      type: string
      title: Alt text
      description: Alternative text for the logo.
      default: Logo
    href:
      type: string
      title: Link URL
      description: URL the logo links to.
      default: /
  required:
    - src

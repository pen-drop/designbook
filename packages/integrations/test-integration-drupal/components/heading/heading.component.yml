$schema: "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: heading
status: experimental
group: Data Display
description: "Heading component with optional preheadline."
provider: daisy_cms_daisyui
props:
  type: object
  properties:
    text:
      type: string
      title: Heading Text
      description: "The heading text."
    level:
      type: string
      title: Level
      enum:
        - h1
        - h2
        - h3
        - h4
      default: h2
    preheadline:
      type: string
      title: Preheadline
      description: "Small text above the heading."
      default: ""
  required:
    - text
thirdPartySettings:
  sdcStorybook:
    disableBasicStory: true

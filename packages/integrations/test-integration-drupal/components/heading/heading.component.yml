$schema: "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: heading
status: experimental
description: Heading component with configurable HTML tag and variant.
provider: daisy_cms_daisyui
thirdPartySettings:
  sdcStorybook:
    disableBasicStory: true
props:
  type: object
  properties:
    text:
      type: string
      title: Heading text
      description: The heading text content.
    html_tag:
      type: string
      title: HTML tag
      description: The HTML heading level.
      default: h2
      enum:
        - h1
        - h2
        - h3
        - h4
        - h5
        - h6
    variant:
      type: string
      title: Variant
      description: Visual variant of the heading.
      default: default
      enum:
        - default
        - hero
        - section
  required:
    - text

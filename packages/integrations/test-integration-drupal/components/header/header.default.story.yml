name: default
slots:
  logo:
    - type: component
      component: 'daisy_cms_daisyui:logo'
      props:
        name: keytec
        url: /
  navigation:
    - type: component
      component: 'daisy_cms_daisyui:navigation'
      props:
        variant: primary
        items:
          - label: Leistungen
            url: /leistungen
          - label: Projekte
            url: /projekte
          - label: Blog
            url: /blog
          - label: Agentur
            url: /agentur
  actions:
    - type: component
      component: 'daisy_cms_daisyui:button'
      props:
        variant: default
        url: /kontakt
      slots:
        text:
          - type: element
            value: Kontakt

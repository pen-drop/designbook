$schema: "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: quote_block
status: experimental
group: Data Display
description: "Customer testimonial with logo, decorative quote mark, quote text, author, and CTA link."
provider: daisy_cms_daisyui
props:
  type: object
  properties:
    quote:
      type: string
      title: Quote
      description: "The quote text."
    author:
      type: string
      title: Author
      description: "Author name and role."
    link_url:
      type: string
      title: Link URL
      description: "URL for the call-to-action link."
    link_label:
      type: string
      title: Link Label
      description: "Label for the call-to-action link."
      default: "PROJEKT ANSEHEN"
slots:
  media:
    title: Media
    description: "Client logo or author photo."
thirdPartySettings:
  sdcStorybook:
    disableBasicStory: true

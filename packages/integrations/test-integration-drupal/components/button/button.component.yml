$schema: "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: button
status: experimental
description: "Simple button component with filled default and outline variant"
provider: daisy_cms_daisyui
variants:
  default:
    title: Default
    description: "Filled/solid button"
  outline:
    title: Outline
    description: "Button with border only"
props:
  type: object
  properties:
    variant:
      type: string
      title: "Visual Variant"
      description: "Choose button style"
      enum:
        - default
        - outline
      default: default
slots:
  text:
    title: "Button Text"
    description: "The clickable label"

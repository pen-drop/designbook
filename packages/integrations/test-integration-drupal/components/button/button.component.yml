$schema: "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: Button
status: stable
description: Button component with multiple variants and states
provider: daisy_cms_daisyui

variants:
  default:
    title: Default
    description: Default button style
  outline:
    title: Outline
    description: Outlined button style

props:
  type: object
  properties:
    variant:
      type: string
      title: Variant
      description: Visual style variant of the button
      enum:
        - default
        - outline
      default: default
    state:
      type: string
      title: State
      description: Button state (enabled or disabled)
      enum:
        - enabled
        - disabled
      default: enabled

slots:
  text:
    title: Button Text
    description: The text content displayed on the button

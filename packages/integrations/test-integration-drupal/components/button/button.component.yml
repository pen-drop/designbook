$schema: "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: button
status: experimental
description: CTA button or link styled as button.
provider: daisy_cms_daisyui
thirdPartySettings:
  sdcStorybook:
    disableBasicStory: true
props:
  type: object
  properties:
    text:
      type: string
      title: Button text
      description: The button label.
    href:
      type: string
      title: Link URL
      description: URL the button links to.
    variant:
      type: string
      title: Variant
      description: Visual variant of the button.
      default: default
      enum:
        - default
        - primary
        - secondary
        - accent
        - ghost
  required:
    - text

name: button
label: Button
status: experimental
group: Action
thirdPartySettings:
  sdcStorybook:
    disableBasicStory: true
    tags:
      - "!autodocs"
props:
  type: object
  properties:
    variant:
      type: string
      title: Variant
      enum:
        - default
        - primary
        - secondary
        - ghost
      default: default
    url:
      type: string
      title: Link URL
    color:
      type: string
      title: Color
      enum:
        - sun
        - ocean
        - swimsuit
slots:
  text:
    title: Button text

name: cta-banner
label: CTA Banner
status: experimental
group: Data Display
thirdPartySettings:
  sdcStorybook:
    disableBasicStory: true
    tags:
      - "!autodocs"
props:
  type: object
  properties:
    variant:
      type: string
      title: Variant
      enum:
        - default
        - contact
      default: default
    title:
      type: string
      title: Title
    background_color:
      type: string
      title: Background color
slots:
  content:
    title: Content
    description: Banner body content (text, contact info)
  media:
    title: Media
    description: Banner image (e.g. contact person photo)
  actions:
    title: Actions
    description: CTA buttons

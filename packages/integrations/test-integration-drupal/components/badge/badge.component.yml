$schema: "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: badge
status: experimental
description: Label or tag badge element.
provider: daisy_cms_daisyui
thirdPartySettings:
  sdcStorybook:
    disableBasicStory: true
props:
  type: object
  properties:
    text:
      type: string
      title: Badge text
      description: The text content of the badge.
    variant:
      type: string
      title: Variant
      description: Visual variant of the badge.
      default: default
      enum:
        - default
        - primary
        - secondary
        - accent
  required:
    - text

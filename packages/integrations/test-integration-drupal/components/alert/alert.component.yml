$schema: "https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json"
name: Alert
status: experimental
description: Alert box component with variants for info, warning, and error states, featuring an icon and message
provider: daisy_cms_daisyui

variants:
  info:
    title: Info
    description: Informational alert style
  warning:
    title: Warning
    description: Warning alert style
  error:
    title: Error
    description: Error alert style

props:
  type: object
  properties:
    variant:
      type: string
      title: Alert Type
      description: Visual style of the alert
      enum:
        - info
        - warning
        - error
      default: info

slots:
  icon:
    title: Icon
    description: Visual indicator on the left side
  message:
    title: Message
    description: Alert message content

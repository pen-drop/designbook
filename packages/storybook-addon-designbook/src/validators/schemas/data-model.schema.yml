$schema: http://json-schema.org/draft-07/schema#
$id: https://raw.githubusercontent.com/pen-drop/designbook/1.x/schemas/data-model.schema.yml
title: Designbook Content Schema
description: Schema for Designbook content and configuration structure data
type: object
properties:
  content:
    type: object
    title: Content
    description: "Content structure: content -> entity_type -> bundle -> field"
    additionalProperties:
      $ref: "#/definitions/entity_type"
  config:
    type: object
    title: Configuration
    description: "Configuration structure: config -> config_type -> config_item"
    properties:
      list:
        type: object
        title: Lists
        description: List configurations — collections of content from one or more sources
        additionalProperties:
          $ref: "#/definitions/list"
    additionalProperties:
      type: object
      description: Additional configuration types can be added here
required:
  - content
definitions:
  entity_type:
    type: object
    title: Entity Type
    description: "Entity type definition (e.g., node, block_content, media, taxonomy)"
    additionalProperties:
      $ref: "#/definitions/bundle"
  bundle:
    type: object
    title: Bundle
    description: Bundle definition with its fields and optional view mode display mappings
    properties:
      composition:
        type: string
        title: Composition
        description: >
          Content composition strategy. "structured" (default): entity has fields,
          some referencing other entities. "unstructured": entity has a layout or
          component tree for view_mode full; all other view modes are always structured.
        enum: [structured, unstructured]
        default: structured
      fields:
        type: object
        title: Fields
        description: Field definitions for this bundle
        additionalProperties:
          $ref: "#/definitions/field"
    additionalProperties: true

  field:
    type: object
    title: Field
    description: Field definition
    properties:
      type:
        type: string
        description: "Field type (string, text, integer, boolean, reference, link, component, layout, etc.)"
      title:
        type: string
        description: Field title
      description:
        type: string
        description: Field description
      required:
        type: boolean
        description: Whether this field is required
      multiple:
        type: boolean
        description: Whether this field can have multiple values
      default:
        description: Default value for this field
      settings:
        type: object
        description: Field-specific settings
        additionalProperties: true
    required:
      - type
    additionalProperties: true
  list:
    type: object
    title: List
    description: List configuration — a collection of content from one or more sources
    properties:
      sources:
        type: array
        description: Content sources for this list
        items:
          $ref: "#/definitions/list_source"
        minItems: 1
      limit:
        type: integer
        description: Maximum number of items to display
      sorting:
        type: string
        description: Sorting hint (declarative, used for documentation/export)
    required:
      - sources
    additionalProperties: true
  list_source:
    type: object
    title: List Source
    description: A content source within a list
    properties:
      entity_type:
        type: string
        description: Entity type (e.g., node, media)
      bundle:
        type: string
        description: Content bundle (e.g., article, event)
      view_mode:
        type: string
        description: View mode for rendering each item (e.g., teaser, search_result)
    required:
      - entity_type
      - bundle
      - view_mode
    additionalProperties: false

$schema: http://json-schema.org/draft-07/schema#
$id: https://raw.githubusercontent.com/pen-drop/designbook/1.x/schemas/data-model.schema.yml
title: Designbook Content Schema
description: Schema for Designbook content and configuration structure data
type: object
properties:
  content:
    type: object
    title: Content
    description: "Content structure: content -> entity_type -> bundle -> field"
    additionalProperties:
      $ref: "#/definitions/entity_type"
  config:
    type: object
    title: Config
    description: "Configuration entities (views, singletons): config -> entity_type -> bundle. Same schema as content."
    additionalProperties:
      $ref: "#/definitions/entity_type"
required:
  - content
definitions:
  entity_type:
    type: object
    title: Entity Type
    description: "Entity type definition (e.g., node, block_content, media, taxonomy)"
    additionalProperties:
      $ref: "#/definitions/bundle"
  bundle:
    type: object
    title: Bundle
    description: Bundle definition with its fields and view mode template mappings
    properties:
      purpose:
        type: string
        title: Purpose
        description: "Semantic intent of this bundle (e.g. landing-page, article, section). Drives view_modes template selection and sample data generation via extension rules."
      view_modes:
        type: object
        title: View Modes
        description: "Per-view-mode mapping configuration: view_mode_name -> { template, settings }"
        additionalProperties:
          $ref: "#/definitions/view_mode"
      fields:
        type: object
        title: Fields
        description: Field definitions for this bundle
        additionalProperties:
          $ref: "#/definitions/field"
    additionalProperties: true

  view_mode:
    type: object
    title: View Mode
    description: View mode mapping configuration
    properties:
      template:
        type: string
        title: Template
        description: "Mapping template to use (e.g. field-map, layout-builder, canvas, view-entity). Must match a registered rule in skills/*/rules/*.md with when: template: <name>."
      settings:
        type: object
        title: Settings
        description: Optional template-specific settings passed as context to the template rule. Each template documents its supported settings.
        additionalProperties: true
    required:
      - template
    additionalProperties: false

  field:
    type: object
    title: Field
    description: Field definition
    properties:
      type:
        type: string
        description: "Field type (string, text, integer, boolean, reference, link, component, layout, etc.)"
      title:
        type: string
        description: Field title
      description:
        type: string
        description: Field description
      required:
        type: boolean
        description: Whether this field is required
      multiple:
        type: boolean
        description: Whether this field can have multiple values
      default:
        description: Default value for this field
      settings:
        type: object
        description: Field-specific settings
        additionalProperties: true
      sample_template:
        type: object
        title: Sample Template
        description: Template configuration for sample data generation. Defines how field values are structured when generating data.yml.
        properties:
          template:
            type: string
            description: "Template name — must match a rule in skills/*/rules/*.md with when: template: <name>. Common values: formatted-text, link, image."
          settings:
            type: object
            title: Settings
            description: "Optional template-specific settings. settings.hint guides content generation. Other keys are template-specific and documented per template."
            additionalProperties: true
        required:
          - template
        additionalProperties: false
    required:
      - type
    additionalProperties: true

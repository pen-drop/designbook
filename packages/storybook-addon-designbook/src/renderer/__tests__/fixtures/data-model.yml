config:
  view:
    recent_articles:
      view_modes:
        default:
          template: view-entity
    mixed_content:
      view_modes:
        default:
          template: view-entity
  image_style:
    16_9:
      aspect_ratio: "16:9"
    hero:
      aspect_ratio: "21:9"
      breakpoints:
        xl: { width: 1200 }
        md: { width: 768, aspect_ratio: "16:9" }
        sm: { width: 480, aspect_ratio: "4:3" }

content:
  node:
    article:
      title: Article
      fields:
        title:
          type: string
          required: true
        field_body:
          type: text
        field_media:
          type: reference
          settings:
            target_type: media
            target_bundle: image
        field_category:
          type: reference
          settings:
            target_type: taxonomy_term
            target_bundle: category
        field_teaser:
          type: string
  user:
    user:
      fields:
        name:
          type: string
        field_avatar:
          type: string

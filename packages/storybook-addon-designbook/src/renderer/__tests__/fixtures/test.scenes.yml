group: Test/Scenes

scenes:
  - name: Flat
    items:
      - entity: node.article
        view_mode: teaser
        record: 0

  - name: EntityInEntity
    items:
      - entity: node.article
        view_mode: with-author
        record: 0

  - name: EntityInComponentSlot
    items:
      - entity: node.article
        view_mode: card
        record: 0

  - name: ViewEntity
    items:
      - entity: view.recent_articles
        view_mode: default

  - name: ComponentDirect
    items:
      - component: test_provider:heading
        props:
          level: h1
        slots:
          text: Hello World

  - name: ComponentMultipleProps
    items:
      - component: test_provider:button
        props:
          variant: outline
          size: lg
          disabled: true
        slots:
          text: Click me

  - name: ComponentPropsOnly
    items:
      - component: test_provider:icon
        props:
          name: arrow-right
          color: blue

  - name: ComponentSlotsOnly
    items:
      - component: test_provider:card
        slots:
          title: My Card
          body: Some content here

  - name: DarkTheme
    theme: dark
    items:
      - component: test_provider:heading
        props:
          level: h1
        slots:
          text: Dark Mode

  - name: ImageProvider
    items:
      - image: hero
        alt: "Hero banner image"

  - name: ImageCss
    items:
      - image: "16_9"
        alt: "Landscape photo"
        src: "/images/landscape.jpg"

  - name: ImageUnknownStyle
    items:
      - image: nonexistent
        alt: "Should show placeholder"

  - name: WithShell
    items:
      - scene: shell:shell
        slots:
          content:
            - entity: node.article
              view_mode: teaser
              record: 0
